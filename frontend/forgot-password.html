<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeReport | Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--primary:#6366f1;--secondary:#8b5cf6;--success:#10b981;--danger:#ef4444;--text:#1e293b;--text-light:#64748b;--border:#e2e8f0;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{min-height:100vh;background:linear-gradient(135deg,#eef2ff,#f8fafc);display:flex;justify-content:center;align-items:center;padding:20px;}
body::before{content:"";position:fixed;width:400px;height:400px;background:radial-gradient(circle,var(--primary),transparent 70%);top:-100px;left:-100px;opacity:.2;filter:blur(80px);animation:float 6s ease-in-out infinite alternate;pointer-events:none;}
@keyframes float{from{transform:translateY(0)}to{transform:translateY(40px)}}
.card{width:100%;max-width:460px;background:rgba(255,255,255,0.92);backdrop-filter:blur(18px);border-radius:24px;padding:44px;box-shadow:0 30px 80px rgba(0,0,0,0.08);animation:fadeIn .5s ease forwards;}
@keyframes fadeIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.logo-box{width:64px;height:64px;margin:0 auto 20px;border-radius:16px;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;}
.logo-box svg{width:32px;height:32px;stroke:white;}
h2{text-align:center;font-size:22px;font-weight:800;color:var(--text);margin-bottom:6px;}
.subtitle{text-align:center;color:var(--text-light);font-size:14px;margin-bottom:28px;line-height:1.5;}
.steps{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:28px;}
.step-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;transition:all .3s;}
.step-dot.active{background:var(--primary);color:white;}
.step-dot.done{background:var(--success);color:white;}
.step-dot.idle{background:var(--border);color:var(--text-light);}
.step-line{width:44px;height:2px;background:var(--border);border-radius:2px;transition:.3s;}
.step-line.done{background:var(--success);}
.step-panel{display:none;}
.step-panel.active{display:block;animation:slide .35s ease forwards;}
@keyframes slide{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
.input-wrap{margin-bottom:18px;}
.input-wrap label{display:block;font-size:12px;font-weight:600;color:var(--text-light);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:6px;}
.input-wrap input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--border);font-size:14px;font-family:inherit;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s;background:white;}
.input-wrap input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,.12);}
.otp-label{text-align:center;font-size:13px;color:var(--text-light);font-weight:500;margin-bottom:16px;line-height:1.5;}
.otp-label strong{color:var(--text);}
.otp-boxes{display:flex;gap:10px;justify-content:center;margin-bottom:8px;}
.otp-box{width:52px;height:60px;border-radius:12px;border:2px solid var(--border);text-align:center;font-size:24px;font-weight:800;color:var(--text);outline:none;transition:all .2s;background:white;}
.otp-box:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,.15);transform:translateY(-2px);}
.otp-box.filled{border-color:var(--primary);background:#f5f3ff;}
.otp-box.error{border-color:var(--danger);background:#fff5f5;animation:shake .3s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.otp-timer{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;font-size:13px;}
.timer-text{color:var(--text-light);}
.timer-text strong{color:var(--primary);font-weight:700;}
.timer-text.expired{color:var(--danger);}
.resend-btn{background:none;border:none;color:var(--primary);font-weight:600;cursor:pointer;font-size:13px;font-family:inherit;padding:0;}
.resend-btn:disabled{color:var(--text-light);cursor:not-allowed;}
.pw-bar-wrap{height:4px;background:var(--border);border-radius:2px;margin:8px 0 4px;overflow:hidden;}
.pw-bar{height:100%;border-radius:2px;transition:width .3s,background .3s;width:0;}
.pw-label{font-size:11px;color:var(--text-light);}
.btn{width:100%;padding:13px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--primary),var(--secondary));color:white;font-size:15px;font-weight:600;cursor:pointer;transition:.25s;position:relative;overflow:hidden;font-family:inherit;}
.btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 10px 25px rgba(99,102,241,.3);}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.btn.loading::after{content:"";position:absolute;right:16px;top:50%;transform:translateY(-50%);width:16px;height:16px;border:2px solid rgba(255,255,255,.5);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:translateY(-50%) rotate(360deg)}}
.alert{padding:11px 14px;border-radius:9px;font-size:13px;margin-bottom:16px;font-weight:500;display:none;}
.alert.error{background:rgba(239,68,68,.08);color:#dc2626;border:1px solid rgba(239,68,68,.2);display:block;}
.alert.success{background:rgba(16,185,129,.08);color:#059669;border:1px solid rgba(16,185,129,.2);display:block;}
.success-state{text-align:center;display:none;}
.success-state.show{display:block;animation:fadeIn .5s ease forwards;}
.success-icon{width:68px;height:68px;margin:0 auto 16px;border-radius:50%;background:var(--success);display:flex;align-items:center;justify-content:center;animation:pop .4s ease;}
@keyframes pop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.success-icon svg{width:32px;height:32px;stroke:white;}
.back{text-align:center;margin-top:20px;font-size:13px;color:var(--text-light);}
.back a{color:var(--primary);text-decoration:none;font-weight:600;}
</style>
</head>
<body>
<div class="card">
    <div class="logo-box">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 2L4 7v5c0 5 3.5 8 8 10 4.5-2 8-5 8-10V7l-8-5z"/></svg>
    </div>
    <h2>Reset Password</h2>
    <p class="subtitle" id="subtitle">Enter your email and we'll send you a 6-digit OTP.</p>
    <div class="steps">
        <div class="step-dot active" id="dot1">1</div>
        <div class="step-line" id="line1"></div>
        <div class="step-dot idle" id="dot2">2</div>
        <div class="step-line" id="line2"></div>
        <div class="step-dot idle" id="dot3">3</div>
    </div>

    <!-- Step 1: Email -->
    <div class="step-panel active" id="step1">
        <div class="alert" id="err1"></div>
        <div class="input-wrap">
            <label>Email Address</label>
            <input type="email" id="emailInput" placeholder="you@example.com" onkeydown="if(event.key==='Enter') sendOTP()">
        </div>
        <button class="btn" id="btn1" onclick="sendOTP()">📧 Send OTP</button>
    </div>

    <!-- Step 2: OTP -->
    <div class="step-panel" id="step2">
        <div class="alert" id="err2"></div>
        <div class="alert" id="suc2"></div>
        <div class="otp-label">We sent a 6-digit OTP to<br><strong id="emailDisplay"></strong></div>
        <div class="otp-boxes" id="otpBoxes">
            <input class="otp-box" type="text" maxlength="1" inputmode="numeric" autocomplete="one-time-code">
            <input class="otp-box" type="text" maxlength="1" inputmode="numeric">
            <input class="otp-box" type="text" maxlength="1" inputmode="numeric">
            <input class="otp-box" type="text" maxlength="1" inputmode="numeric">
            <input class="otp-box" type="text" maxlength="1" inputmode="numeric">
            <input class="otp-box" type="text" maxlength="1" inputmode="numeric">
        </div>
        <div class="otp-timer">
            <span class="timer-text" id="timerText">Expires in <strong id="timerVal">10:00</strong></span>
            <button class="resend-btn" id="resendBtn" onclick="resendOTP()" disabled>Resend OTP</button>
        </div>
        <button class="btn" id="btn2" onclick="verifyOTP()">✅ Verify OTP</button>
    </div>

    <!-- Step 3: New Password -->
    <div class="step-panel" id="step3">
        <div class="alert" id="err3"></div>
        <div class="input-wrap">
            <label>New Password</label>
            <input type="password" id="newPassword" placeholder="Min. 6 characters" oninput="checkStrength()" onkeydown="if(event.key==='Enter') doReset()">
            <div class="pw-bar-wrap"><div class="pw-bar" id="pwBar"></div></div>
            <div class="pw-label" id="pwLabel"></div>
        </div>
        <div class="input-wrap">
            <label>Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Repeat new password" onkeydown="if(event.key==='Enter') doReset()">
        </div>
        <button class="btn" id="btn3" onclick="doReset()">🔒 Reset Password</button>
    </div>

    <!-- Success -->
    <div class="success-state" id="successState">
        <div class="success-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
        </div>
        <h3 style="font-size:18px;font-weight:800;color:var(--text);">Password Updated!</h3>
        <p style="color:var(--text-light);font-size:14px;margin-top:8px;line-height:1.6;">Your password has been reset successfully.<br>Redirecting to login…</p>
    </div>

    <div class="back">Back to <a href="login.html">Login</a></div>
</div>

<script>
const API = "http://localhost:8080/api";
let currentEmail = "", verifiedOTP = "", timerInterval, timeLeft = 600;

const boxes = document.querySelectorAll(".otp-box");
boxes.forEach((box, i) => {
    box.addEventListener("input", () => {
        box.value = box.value.replace(/[^0-9]/g,"");
        box.classList.toggle("filled", !!box.value);
        if (box.value && i < boxes.length - 1) boxes[i+1].focus();
    });
    box.addEventListener("keydown", e => {
        if (e.key === "Backspace" && !box.value && i > 0) boxes[i-1].focus();
        if (e.key === "Enter") verifyOTP();
    });
});

document.getElementById("otpBoxes").addEventListener("paste", e => {
    const paste = e.clipboardData.getData("text").replace(/\D/g,"").slice(0,6);
    boxes.forEach((b,i) => { b.value = paste[i]||""; b.classList.toggle("filled",!!b.value); });
    if (paste.length) boxes[Math.min(paste.length,5)].focus();
    e.preventDefault();
});

function getOTP() { return Array.from(boxes).map(b=>b.value).join(""); }
function clearOTP() { boxes.forEach(b=>{b.value="";b.classList.remove("filled","error");}); boxes[0].focus(); }
function shakeOTP() { boxes.forEach(b=>{b.classList.add("error");setTimeout(()=>b.classList.remove("error"),400);}); }

function startTimer() {
    clearInterval(timerInterval);
    timeLeft = 600;
    document.getElementById("resendBtn").disabled = true;
    document.getElementById("timerText").className = "timer-text";
    document.getElementById("timerText").innerHTML = 'Expires in <strong id="timerVal">10:00</strong>';
    updateTimer();
    timerInterval = setInterval(() => {
        timeLeft--;
        updateTimer();
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            document.getElementById("timerText").className = "timer-text expired";
            document.getElementById("timerText").innerHTML = "OTP expired";
            document.getElementById("resendBtn").disabled = false;
        }
    }, 1000);
}
function updateTimer() {
    const el = document.getElementById("timerVal");
    if (el) el.textContent = String(Math.floor(timeLeft/60)).padStart(2,"0") + ":" + String(timeLeft%60).padStart(2,"0");
}

function showAlert(id, msg, type="error") {
    const el = document.getElementById(id);
    el.textContent = (type==="error"?"⚠️ ":"✅ ") + msg;
    el.className = "alert " + type;
}
function hideAlert(id) { const el=document.getElementById(id); el.className="alert"; el.textContent=""; }

function setLoading(id, on) { const b=document.getElementById(id); b.disabled=on; b.classList.toggle("loading",on); }

function goToStep(n) {
    [1,2,3].forEach(i => document.getElementById("step"+i).classList.toggle("active",i===n));
    [1,2,3].forEach(i => {
        const d = document.getElementById("dot"+i);
        if (i<n){d.className="step-dot done";d.textContent="✓";}
        else if(i===n){d.className="step-dot active";d.textContent=i;}
        else{d.className="step-dot idle";d.textContent=i;}
    });
    [1,2].forEach(i => document.getElementById("line"+i).className="step-line"+(i<n?" done":""));
}

async function sendOTP() {
    const email = document.getElementById("emailInput").value.trim();
    hideAlert("err1");
    if (!email||!email.includes("@")) { showAlert("err1","Please enter a valid email address."); return; }
    setLoading("btn1",true);
    try {
        await fetch(`${API}/auth/forgot-password`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email})});
        currentEmail = email;
        document.getElementById("emailDisplay").textContent = email;
        document.getElementById("subtitle").textContent = "Enter the OTP sent to your email.";
        goToStep(2); startTimer();
        setTimeout(() => boxes[0].focus(), 300);
    } catch(e) { showAlert("err1","Could not connect. Check your connection."); }
    finally { setLoading("btn1",false); }
}

function verifyOTP() {
    hideAlert("err2"); hideAlert("suc2");
    const otp = getOTP();
    if (otp.length < 6) { showAlert("err2","Please enter all 6 digits."); shakeOTP(); return; }
    if (timeLeft <= 0)  { showAlert("err2","OTP has expired. Please request a new one."); shakeOTP(); return; }
    verifiedOTP = otp;
    document.getElementById("subtitle").textContent = "Set your new password.";
    goToStep(3);
    setTimeout(() => document.getElementById("newPassword").focus(), 300);
}

async function resendOTP() {
    hideAlert("err2");
    try {
        await fetch(`${API}/auth/forgot-password`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:currentEmail})});
        clearOTP(); startTimer();
        showAlert("suc2","New OTP sent to "+currentEmail,"success");
    } catch(e) { showAlert("err2","Could not resend. Try again."); }
}

async function doReset() {
    const newPassword=document.getElementById("newPassword").value;
    const confirmPassword=document.getElementById("confirmPassword").value;
    hideAlert("err3");
    if (newPassword.length<6)          { showAlert("err3","Password must be at least 6 characters."); return; }
    if (newPassword!==confirmPassword) { showAlert("err3","Passwords do not match."); return; }
    setLoading("btn3",true);
    try {
        const res  = await fetch(`${API}/auth/reset-password`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token:verifiedOTP,newPassword,confirmPassword})});
        const json = await res.json();
        if (!json.success) {
            showAlert("err3", json.message||"Invalid OTP. Please try again.");
            goToStep(2); clearOTP();
            document.getElementById("subtitle").textContent = "Enter the OTP sent to your email.";
            return;
        }
        clearInterval(timerInterval);
        document.querySelector(".steps").style.display="none";
        document.querySelector(".subtitle").style.display="none";
        document.getElementById("step3").style.display="none";
        document.getElementById("successState").classList.add("show");
        setTimeout(()=>window.location.href="login.html",3000);
    } catch(e) { showAlert("err3","Server error. Please try again."); }
    finally { setLoading("btn3",false); }
}

function checkStrength() {
    const pw=document.getElementById("newPassword").value;
    const bar=document.getElementById("pwBar"), lbl=document.getElementById("pwLabel");
    if(!pw){bar.style.width="0";lbl.textContent="";return;}
    const s=[pw.length>=6,pw.length>=10,/[A-Z]/.test(pw),/[0-9]/.test(pw),/[^A-Za-z0-9]/.test(pw)].filter(Boolean).length;
    const L=[{w:"20%",c:"#ef4444",t:"Too short"},{w:"40%",c:"#f97316",t:"Weak"},{w:"60%",c:"#f59e0b",t:"Fair"},{w:"80%",c:"#6366f1",t:"Good"},{w:"100%",c:"#10b981",t:"Strong"}];
    const l=L[Math.min(s-1,4)]||L[0];
    bar.style.width=l.w;bar.style.background=l.c;lbl.textContent=l.t;lbl.style.color=l.c;
}
</script>
</body>
</html>
