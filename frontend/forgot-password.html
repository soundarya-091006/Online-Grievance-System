<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeReport | Forgot Password</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
--primary:#6366f1;
--secondary:#8b5cf6;
--success:#10b981;
--danger:#ef4444;
--text:#1e293b;
--border:#e2e8f0;
--bg:#f8fafc;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
height:100vh;
background:linear-gradient(135deg,#eef2ff,#f8fafc);
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* Background Glow */
body::before{
content:"";
position:absolute;
width:400px;
height:400px;
background:radial-gradient(circle,var(--primary),transparent 70%);
top:-100px;
left:-100px;
opacity:.25;
filter:blur(80px);
animation:float 6s ease-in-out infinite alternate;
}

@keyframes float{
from{transform:translateY(0px);}
to{transform:translateY(40px);}
}

.card{
width:480px;
background:rgba(255,255,255,0.85);
backdrop-filter:blur(18px);
border-radius:24px;
padding:45px;
box-shadow:0 30px 80px rgba(0,0,0,0.08);
position:relative;
overflow:hidden;
animation:fadeIn .6s ease forwards;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(40px);}
to{opacity:1;transform:translateY(0);}
}

.logo-box{
width:70px;height:70px;
margin:0 auto 20px;
border-radius:18px;
background:linear-gradient(135deg,var(--primary),var(--secondary));
display:flex;align-items:center;justify-content:center;
}

.logo-box svg{
width:35px;height:35px;
stroke:white;
}

h2{
text-align:center;
color:var(--text);
margin-bottom:5px;
}

.subtitle{
text-align:center;
color:#64748b;
margin-bottom:30px;
font-size:14px;
}

/* Step container */
.step{
display:none;
animation:slide .4s ease forwards;
}

.step.active{
display:block;
}

@keyframes slide{
from{opacity:0;transform:translateX(30px);}
to{opacity:1;transform:translateX(0);}
}

/* Floating Input */
.input-group{
position:relative;
margin-bottom:22px;
}

.input-group input{
width:100%;
padding:14px 12px;
border-radius:12px;
border:1px solid var(--border);
outline:none;
transition:.3s;
font-size:14px;
background:white;
}

.input-group label{
position:absolute;
left:12px;
top:50%;
transform:translateY(-50%);
background:white;
padding:0 5px;
color:#94a3b8;
font-size:13px;
transition:.3s;
pointer-events:none;
}

.input-group input:focus{
border-color:var(--primary);
box-shadow:0 0 0 3px rgba(99,102,241,.15);
}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label{
top:-8px;
font-size:11px;
color:var(--primary);
}

/* Button */
.btn{
width:100%;
padding:13px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,var(--primary),var(--secondary));
color:white;
font-weight:600;
cursor:pointer;
transition:.3s;
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(99,102,241,.3);
}

/* Back to login */
.back{
text-align:center;
margin-top:18px;
font-size:14px;
color:#64748b;
}

.back a{
color:var(--primary);
text-decoration:none;
font-weight:500;
}

/* Success Animation */
.success{
text-align:center;
display:none;
animation:fadeIn .5s ease forwards;
}

.success-icon{
width:70px;
height:70px;
margin:0 auto 15px;
border-radius:50%;
background:var(--success);
display:flex;
align-items:center;
justify-content:center;
animation:pop .4s ease forwards;
}

/* OTP BOXES */

.otp-container{
display:flex;
gap:10px;
justify-content:space-between;
}

.otp-input{
width:48px;
height:55px;
border-radius:12px;
border:1px solid var(--border);
text-align:center;
font-size:20px;
font-weight:600;
outline:none;
transition:.3s;
background:white;
}

.otp-input:focus{
border-color:var(--primary);
box-shadow:0 0 0 3px rgba(99,102,241,.15);
transform:translateY(-2px);
}

.otp-input.filled{
border-color:var(--primary);
}

@keyframes pop{
from{transform:scale(.6);opacity:0;}
to{transform:scale(1);opacity:1;}
}

.success-icon svg{
width:35px;height:35px;stroke:white;
}

</style>
</head>

<body>

<div class="card">

<div class="logo-box">
<svg viewBox="0 0 24 24" fill="none" stroke-width="2">
<path d="M12 2L4 7v5c0 5 3.5 8 8 10 4.5-2 8-5 8-10V7l-8-5z"/>
</svg>
</div>

<h2>Reset Password</h2>
<div class="subtitle">Secure your SafeReport account</div>

<!-- STEP 1 -->
<div class="step active" id="step1">
<div class="input-group">
<input type="email" id="email" placeholder=" " required>
<label>Email Address</label>
</div>

<button class="btn" onclick="sendOTP()">Send Reset Link</button>
</div>

<!-- STEP 2 -->
<div class="step" id="step2">
<div style="margin-bottom:18px;">
<label style="font-size:13px;color:#64748b;margin-bottom:8px;display:block;">
Enter 6-Digit OTP
</label>

<div class="otp-container">
<input type="text" maxlength="1" class="otp-input">
<input type="text" maxlength="1" class="otp-input">
<input type="text" maxlength="1" class="otp-input">
<input type="text" maxlength="1" class="otp-input">
<input type="text" maxlength="1" class="otp-input">
<input type="text" maxlength="1" class="otp-input">
</div>
</div>
<div id="otpTimerBox" style="display:flex;justify-content:space-between;align-items:center;margin-top:-10px;margin-bottom:15px;font-size:13px;">

<span id="countdownText" style="color:#64748b;">
OTP expires in <strong id="timer">01:00</strong>
</span>

<button id="resendBtn"
style="background:none;border:none;color:var(--primary);font-weight:600;cursor:pointer;display:none;"
onclick="resendOTP()">
Resend OTP
</button>

</div>

<div class="input-group">
<input type="password" id="newPassword" placeholder=" ">
<label>New Password</label>
</div>

<button class="btn" onclick="resetPassword()">Reset Password</button>
</div>

<!-- SUCCESS -->
<div class="success" id="successBox">
<div class="success-icon">
<svg viewBox="0 0 24 24" fill="none" stroke-width="2">
<path d="M20 6L9 17l-5-5"/>
</svg>
</div>
<h3>Password Updated!</h3>
<p style="color:#64748b;font-size:14px;margin-top:8px;">
You can now login with your new password.
</p>
</div>

<div class="back">
Back to <a href="login.html">Login</a>
</div>

</div>

<script>

function sendOTP(){
const email=document.getElementById("email").value.trim();

if(!email.includes("@")){
alert("Please enter valid email");
return;
}

document.getElementById("step1").classList.remove("active");
document.getElementById("step2").classList.add("active");
}

function resetPassword(){

const otp=getOTP();
const newPassword=document.getElementById("newPassword").value;

if(otp !== "123456"){
alert("Invalid OTP (Demo: 123456)");
return;
}

if(newPassword.length < 6){
alert("Password must be at least 6 characters");
return;
}

document.getElementById("step2").style.display="none";
document.getElementById("successBox").style.display="block";

setTimeout(()=>{
window.location.href="login.html";
},3000);

}

/* ================= OTP TIMER ================= */

let countdown;
let timeLeft = 60;

function startTimer() {

    timeLeft = 60;
    document.getElementById("resendBtn").style.display = "none";
    document.getElementById("countdownText").style.display = "block";

    updateTimerDisplay();

    countdown = setInterval(() => {

        timeLeft--;

        updateTimerDisplay();

        if (timeLeft <= 0) {
            clearInterval(countdown);
            document.getElementById("countdownText").style.display = "none";
            document.getElementById("resendBtn").style.display = "inline";
        }

    }, 1000);
}

function updateTimerDisplay() {

    const minutes = String(Math.floor(timeLeft / 60)).padStart(2, '0');
    const seconds = String(timeLeft % 60).padStart(2, '0');

    document.getElementById("timer").innerText = minutes + ":" + seconds;
}

function resendOTP() {

    alert("New OTP sent! (Demo: 123456)");

    startTimer();
}

/* MODIFY YOUR EXISTING sendOTP FUNCTION */

function sendOTP(){

    const email=document.getElementById("email").value.trim();

    if(!email.includes("@")){
        alert("Please enter valid email");
        return;
    }

    document.getElementById("step1").classList.remove("active");
    document.getElementById("step2").classList.add("active");

    startTimer();   // 🔥 START TIMER HERE
}

/* ================= PREMIUM OTP INPUT LOGIC ================= */

const otpInputs = document.querySelectorAll(".otp-input");

otpInputs.forEach((input, index) => {

    /* Only Numbers */
    input.addEventListener("input", (e) => {

        input.value = input.value.replace(/[^0-9]/g, '');

        if (input.value !== '') {
            input.classList.add("filled");

            if (index < otpInputs.length - 1) {
                otpInputs[index + 1].focus();
            }
        } else {
            input.classList.remove("filled");
        }

    });

    /* Backspace Move Back */
    input.addEventListener("keydown", (e) => {

        if (e.key === "Backspace" && input.value === "" && index > 0) {
            otpInputs[index - 1].focus();
        }

    });

});

/* Paste Support */
document.querySelector(".otp-container")
.addEventListener("paste", function(e){

    const pasteData = e.clipboardData.getData("text").trim();

    if(/^[0-9]{6}$/.test(pasteData)){
        otpInputs.forEach((input, i)=>{
            input.value = pasteData[i];
            input.classList.add("filled");
        });
        otpInputs[5].focus();
    }

    e.preventDefault();
});

/* Get OTP Value Function */
function getOTP(){
    return Array.from(otpInputs).map(input => input.value).join('');
}

</script>

</body>
</html>
