<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeReport | Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --primary:#6366f1; --secondary:#8b5cf6;
    --success:#10b981; --danger:#ef4444;
    --warning:#f59e0b; --text:#1e293b;
    --text-light:#64748b; --border:#e2e8f0; --bg:#f8fafc;
}
* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }

body {
    min-height:100vh;
    background:linear-gradient(135deg,#eef2ff,#f8fafc);
    display:flex; justify-content:center; align-items:center; padding:20px;
}

body::before {
    content:""; position:fixed;
    width:400px; height:400px;
    background:radial-gradient(circle,var(--primary),transparent 70%);
    top:-100px; left:-100px; opacity:.2; filter:blur(80px);
    animation:float 6s ease-in-out infinite alternate; pointer-events:none;
}
@keyframes float { from{transform:translateY(0)} to{transform:translateY(40px)} }

.card {
    width:100%; max-width:460px;
    background:rgba(255,255,255,0.9); backdrop-filter:blur(18px);
    border-radius:24px; padding:44px;
    box-shadow:0 30px 80px rgba(0,0,0,0.08);
    animation:fadeIn .5s ease forwards;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }

.logo-box {
    width:64px; height:64px; margin:0 auto 20px;
    border-radius:16px;
    background:linear-gradient(135deg,var(--primary),var(--secondary));
    display:flex; align-items:center; justify-content:center;
}
.logo-box svg { width:32px; height:32px; stroke:white; }

h2 { text-align:center; font-size:22px; font-weight:800; color:var(--text); margin-bottom:6px; }
.subtitle { text-align:center; color:var(--text-light); font-size:14px; margin-bottom:28px; line-height:1.5; }

/* Steps */
.step { display:none; animation:slideIn .35s ease forwards; }
.step.active { display:block; }
@keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }

/* Input */
.input-wrap { margin-bottom:18px; }
.input-wrap label { display:block; font-size:12px; font-weight:600;
    color:var(--text-light); text-transform:uppercase; letter-spacing:0.4px; margin-bottom:6px; }
.input-wrap input {
    width:100%; padding:12px 14px; border-radius:10px;
    border:1px solid var(--border); font-size:14px; font-family:inherit;
    color:var(--text); outline:none; transition:border-color .2s, box-shadow .2s;
    background:white;
}
.input-wrap input:focus {
    border-color:var(--primary);
    box-shadow:0 0 0 3px rgba(99,102,241,.12);
}

/* Password strength */
.pw-strength { margin-top:6px; }
.pw-bar { height:4px; border-radius:2px; background:var(--border);
    overflow:hidden; margin-bottom:4px; }
.pw-fill { height:100%; border-radius:2px; transition:width .3s, background .3s; width:0; }
.pw-label { font-size:11px; color:var(--text-light); }

/* Token hint */
.token-hint {
    background:rgba(99,102,241,0.06); border:1px solid rgba(99,102,241,0.2);
    border-radius:10px; padding:12px 14px; margin-bottom:18px;
    font-size:13px; color:var(--text-light); line-height:1.5;
}
.token-hint strong { color:var(--primary); }

/* Button */
.btn {
    width:100%; padding:13px; border:none; border-radius:12px;
    background:linear-gradient(135deg,var(--primary),var(--secondary));
    color:white; font-size:15px; font-weight:600;
    cursor:pointer; transition:.25s; position:relative; overflow:hidden;
}
.btn:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 10px 25px rgba(99,102,241,.3); }
.btn:disabled { opacity:.6; cursor:not-allowed; transform:none; }
.btn.loading::after {
    content:""; position:absolute; right:16px; top:50%; transform:translateY(-50%);
    width:16px; height:16px; border:2px solid rgba(255,255,255,.5);
    border-top-color:white; border-radius:50%; animation:spin .7s linear infinite;
}
@keyframes spin { to{transform:translateY(-50%) rotate(360deg)} }

/* Alert */
.alert { padding:12px 14px; border-radius:10px; font-size:13px;
    margin-bottom:16px; font-weight:500; display:none; }
.alert.error   { background:rgba(239,68,68,.08);  color:#dc2626; border:1px solid rgba(239,68,68,.2); }
.alert.success { background:rgba(16,185,129,.08); color:#059669; border:1px solid rgba(16,185,129,.2); }
.alert.show { display:block; }

/* Success state */
.success-state { text-align:center; display:none; }
.success-state.show { display:block; animation:fadeIn .5s ease forwards; }
.success-icon {
    width:68px; height:68px; margin:0 auto 16px; border-radius:50%;
    background:var(--success); display:flex; align-items:center; justify-content:center;
    animation:pop .4s ease;
}
@keyframes pop { from{transform:scale(.5);opacity:0} to{transform:scale(1);opacity:1} }
.success-icon svg { width:32px; height:32px; stroke:white; }

/* Steps indicator */
.steps-indicator {
    display:flex; align-items:center; justify-content:center;
    gap:8px; margin-bottom:28px;
}
.step-dot {
    width:28px; height:28px; border-radius:50%; display:flex;
    align-items:center; justify-content:center; font-size:12px; font-weight:700;
    transition:all .3s;
}
.step-dot.done   { background:var(--success); color:white; }
.step-dot.active { background:var(--primary); color:white; }
.step-dot.idle   { background:var(--border); color:var(--text-light); }
.step-line { width:40px; height:2px; background:var(--border); border-radius:2px; transition:.3s; }
.step-line.done { background:var(--success); }

.back { text-align:center; margin-top:20px; font-size:13px; color:var(--text-light); }
.back a { color:var(--primary); text-decoration:none; font-weight:600; }
.back a:hover { text-decoration:underline; }
</style>
</head>
<body>

<div class="card">

    <div class="logo-box">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
            <path d="M12 2L4 7v5c0 5 3.5 8 8 10 4.5-2 8-5 8-10V7l-8-5z"/>
        </svg>
    </div>

    <h2>Reset Password</h2>
    <p class="subtitle" id="subtitle">Enter your email to receive a password reset token.</p>

    <!-- Steps indicator -->
    <div class="steps-indicator">
        <div class="step-dot active" id="dot1">1</div>
        <div class="step-line" id="line1"></div>
        <div class="step-dot idle" id="dot2">2</div>
    </div>

    <!-- STEP 1: Email -->
    <div class="step active" id="step1">
        <div class="alert error" id="err1"></div>

        <div class="input-wrap">
            <label>Email Address</label>
            <input type="email" id="emailInput" placeholder="you@example.com"
                   onkeydown="if(event.key==='Enter') sendReset()">
        </div>

        <button class="btn" id="btn1" onclick="sendReset()">📧 Send Reset Token</button>
    </div>

    <!-- STEP 2: Token + New Password -->
    <div class="step" id="step2">
        <div class="alert error"   id="err2"></div>
        <div class="alert success" id="suc2"></div>

        <div class="token-hint">
            📬 A reset token was sent to <strong id="emailDisplay"></strong>.<br>
            Copy the token from the email and paste it below.
        </div>

        <div class="input-wrap">
            <label>Reset Token</label>
            <input type="text" id="tokenInput" placeholder="Paste token from email"
                   style="font-family:monospace;font-size:13px;">
        </div>

        <div class="input-wrap">
            <label>New Password</label>
            <input type="password" id="newPassword" placeholder="Min. 6 characters"
                   oninput="checkStrength()" onkeydown="if(event.key==='Enter') doReset()">
            <div class="pw-strength">
                <div class="pw-bar"><div class="pw-fill" id="pwFill"></div></div>
                <div class="pw-label" id="pwLabel"></div>
            </div>
        </div>

        <div class="input-wrap">
            <label>Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Repeat new password"
                   onkeydown="if(event.key==='Enter') doReset()">
        </div>

        <button class="btn" id="btn2" onclick="doReset()">🔒 Reset Password</button>

        <div style="text-align:center;margin-top:14px;font-size:13px;color:var(--text-light);">
            Didn't receive an email?
            <button onclick="resend()" style="background:none;border:none;color:var(--primary);
                font-weight:600;cursor:pointer;font-size:13px;">Resend</button>
        </div>
    </div>

    <!-- SUCCESS -->
    <div class="success-state" id="successState">
        <div class="success-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5">
                <path d="M20 6L9 17l-5-5"/>
            </svg>
        </div>
        <h3 style="font-size:18px;font-weight:800;color:var(--text);">Password Updated!</h3>
        <p style="color:var(--text-light);font-size:14px;margin-top:8px;line-height:1.6;">
            Your password has been reset successfully.<br>
            Redirecting to login…
        </p>
    </div>

    <div class="back">Back to <a href="login.html">Login</a></div>
</div>

<script>
    const API = "http://localhost:8080/api";
    let currentEmail = "";

    function showErr(id, msg) {
        const el = document.getElementById(id);
        el.textContent = "⚠️ " + msg;
        el.className = "alert error show";
    }
    function showSuc(id, msg) {
        const el = document.getElementById(id);
        el.textContent = "✅ " + msg;
        el.className = "alert success show";
    }
    function hideAlert(id) {
        document.getElementById(id).className = "alert error";
    }

    function setLoading(btnId, loading) {
        const btn = document.getElementById(btnId);
        btn.disabled = loading;
        btn.classList.toggle("loading", loading);
    }

    async function sendReset() {
        const email = document.getElementById("emailInput").value.trim();
        hideAlert("err1");

        if (!email || !email.includes("@")) {
            showErr("err1", "Please enter a valid email address."); return;
        }

        setLoading("btn1", true);
        try {
            const res = await fetch(`${API}/auth/forgot-password`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email })
            });
            const json = await res.json();

            // Backend always returns success message regardless of whether email exists
            // (security best practice — don't reveal if email is registered)
            currentEmail = email;
            document.getElementById("emailDisplay").textContent = email;

            // Move to step 2
            document.getElementById("step1").classList.remove("active");
            document.getElementById("step2").classList.add("active");
            document.getElementById("subtitle").textContent =
                "Check your email for the reset token.";

            // Update indicator
            document.getElementById("dot1").className = "step-dot done";
            document.getElementById("dot1").textContent = "✓";
            document.getElementById("line1").className  = "step-line done";
            document.getElementById("dot2").className   = "step-dot active";

            document.getElementById("tokenInput").focus();

        } catch(e) {
            showErr("err1", "Could not connect to server. Make sure the backend is running.");
        } finally {
            setLoading("btn1", false);
        }
    }

    async function doReset() {
        const token           = document.getElementById("tokenInput").value.trim();
        const newPassword     = document.getElementById("newPassword").value;
        const confirmPassword = document.getElementById("confirmPassword").value;

        hideAlert("err2");
        hideAlert("suc2");

        if (!token)                           { showErr("err2", "Please enter the reset token from your email."); return; }
        if (newPassword.length < 6)           { showErr("err2", "Password must be at least 6 characters."); return; }
        if (newPassword !== confirmPassword)  { showErr("err2", "Passwords do not match."); return; }

        setLoading("btn2", true);
        try {
            const res = await fetch(`${API}/auth/reset-password`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ token, newPassword, confirmPassword })
            });
            const json = await res.json();

            if (!json.success) {
                showErr("err2", json.message || "Invalid or expired token. Request a new one.");
                return;
            }

            // Show success
            document.getElementById("step2").style.display = "none";
            document.getElementById("successState").classList.add("show");
            document.querySelector(".steps-indicator").style.display = "none";

            setTimeout(() => window.location.href = "login.html", 3000);

        } catch(e) {
            showErr("err2", "Server error. Please try again.");
        } finally {
            setLoading("btn2", false);
        }
    }

    async function resend() {
        if (!currentEmail) return;
        try {
            await fetch(`${API}/auth/forgot-password`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email: currentEmail })
            });
            showSuc("suc2", "A new token has been sent to " + currentEmail);
        } catch(e) {
            showErr("err2", "Could not resend. Check your connection.");
        }
    }

    function checkStrength() {
        const pw   = document.getElementById("newPassword").value;
        const fill = document.getElementById("pwFill");
        const lbl  = document.getElementById("pwLabel");
        if (!pw) { fill.style.width="0"; lbl.textContent=""; return; }

        const checks = [pw.length >= 6, pw.length >= 10, /[A-Z]/.test(pw), /[0-9]/.test(pw), /[^A-Za-z0-9]/.test(pw)];
        const score  = checks.filter(Boolean).length;
        const levels = [
            {w:"20%", c:"#ef4444", t:"Too short"},
            {w:"40%", c:"#f97316", t:"Weak"},
            {w:"60%", c:"#f59e0b", t:"Fair"},
            {w:"80%", c:"#6366f1", t:"Good"},
            {w:"100%",c:"#10b981", t:"Strong"},
        ];
        const lvl = levels[Math.min(score-1, 4)] || levels[0];
        fill.style.width     = lvl.w;
        fill.style.background = lvl.c;
        lbl.textContent       = lvl.t;
        lbl.style.color       = lvl.c;
    }
</script>
</body>
</html>
