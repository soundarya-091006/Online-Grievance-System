<!DOCTYPE html>
<html lang="en">

<head>
    <style>
        body {
            visibility: hidden
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeReport | My Complaints</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #8b5cf6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --bg: #f8fafc;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 1000;
            gap: 20px;
        }

        .hamburger-menu {
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
        }

        .hamburger-btn {
            display: flex;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
        }

        .hamburger-btn svg {
            width: 24px;
            height: 24px;
            stroke: var(--text);
            stroke-width: 2;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .hamburger-menu-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 12px;
            min-width: 220px;
            margin-top: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
            display: none;
            z-index: 2000;
            overflow: hidden;
        }

        .hamburger-menu-dropdown.active {
            display: block;
        }

        .hamburger-menu-dropdown .menu-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            color: var(--text);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s;
        }

        .hamburger-menu-dropdown .menu-link:hover {
            background: var(--bg);
            padding-left: 22px;
        }

        .hamburger-menu-dropdown .menu-link.active {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
        }

        .menu-icon {
            width: 18px;
            height: 18px;
            stroke-width: 2;
            flex-shrink: 0;
        }

        .topbar-right {
            display: flex;
            align-items: center;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 15px;
            border-radius: 12px;
            background: var(--white);
            border: 1px solid var(--border);
            cursor: pointer;
            position: relative;
        }

        .user-avatar {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 14px;
        }

        .user-info {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            font-size: 14px;
            font-weight: 600;
        }

        .user-role {
            font-size: 12px;
            color: var(--text-light);
        }

        .user-menu-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 12px;
            min-width: 190px;
            margin-top: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
            display: none;
            z-index: 2000;
            overflow: hidden;
        }

        .user-menu-dropdown.active {
            display: block;
        }

        .user-menu-dropdown a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            color: var(--text);
            text-decoration: none;
            font-size: 14px;
            border-bottom: 1px solid var(--border);
            transition: all 0.2s;
        }

        .user-menu-dropdown a:last-child {
            border-bottom: none;
        }

        .user-menu-dropdown a:hover {
            background: var(--bg);
        }

        .user-menu-dropdown svg {
            width: 16px;
            height: 16px;
            stroke: var(--text-light);
        }

        .main-content {
            margin-top: 70px;
            padding: 30px;
        }

        .page-header {
            margin-bottom: 28px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 16px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .page-subtitle {
            font-size: 15px;
            color: var(--text-light);
        }

        .stat-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .stat-tab {
            padding: 10px 20px;
            border-radius: 12px;
            border: 1.5px solid var(--border);
            background: var(--white);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-light);
        }

        .stat-tab.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .stat-tab span {
            font-size: 16px;
            font-weight: 800;
            display: block;
            color: inherit;
        }

        .filter-bar {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 24px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-bar select,
        .filter-bar input {
            padding: 9px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 13px;
            background: var(--bg);
            color: var(--text);
            cursor: pointer;
        }

        .filter-bar select:focus,
        .filter-bar input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-reset {
            padding: 9px 18px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            background: var(--white);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-light);
            transition: all 0.2s;
        }

        .btn-reset:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .complaints-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .complaint-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 24px;
            transition: all 0.3s;
            animation: fadeInUp 0.4s ease both;
        }

        .complaint-card:hover {
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.07);
            transform: translateY(-2px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .card-id {
            font-size: 13px;
            font-weight: 700;
            color: var(--primary);
            background: rgba(99, 102, 241, 0.08);
            padding: 4px 12px;
            border-radius: 8px;
        }

        .card-badges {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
        }

        .priority-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
        }

        .status-new {
            background: rgba(59, 130, 246, 0.1);
            color: #1e40af;
        }

        .status-review {
            background: rgba(245, 158, 11, 0.1);
            color: #92400e;
        }

        .status-assigned {
            background: rgba(139, 92, 246, 0.1);
            color: #5b21b6;
        }

        .status-progress {
            background: rgba(245, 158, 11, 0.1);
            color: #92400e;
        }

        .status-resolved {
            background: rgba(16, 185, 129, 0.1);
            color: #065f46;
        }

        .status-closed {
            background: rgba(100, 116, 139, 0.1);
            color: #475569;
        }

        .p-critical {
            background: rgba(124, 58, 237, 0.1);
            color: #6d28d9;
        }

        .p-high {
            background: rgba(239, 68, 68, 0.1);
            color: #b91c1c;
        }

        .p-medium {
            background: rgba(245, 158, 11, 0.1);
            color: #92400e;
        }

        .p-low {
            background: rgba(100, 116, 139, 0.1);
            color: #475569;
        }

        .card-title {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .card-desc {
            font-size: 14px;
            color: var(--text-light);
            margin-bottom: 14px;
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-meta {
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 16px;
        }

        .card-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .card-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            border-top: 1px solid var(--border);
            padding-top: 14px;
        }

        .btn-sm {
            padding: 7px 16px;
            border-radius: 9px;
            border: 1.5px solid var(--border);
            background: var(--white);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text);
            text-decoration: none;
        }

        .btn-sm:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-sm.primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-color: transparent;
        }

        .btn-sm.primary:hover {
            opacity: 0.9;
        }

        .progress-track {
            display: flex;
            align-items: center;
            gap: 0;
            margin-bottom: 14px;
        }

        .progress-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .progress-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid var(--border);
            background: var(--white);
            transition: all 0.3s;
            z-index: 1;
        }

        .progress-dot.done {
            background: var(--success);
            border-color: var(--success);
        }

        .progress-dot.active {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .progress-lbl {
            font-size: 10px;
            color: var(--text-light);
            margin-top: 4px;
            text-align: center;
            white-space: nowrap;
        }

        .progress-line {
            flex: 1;
            height: 2px;
            background: var(--border);
        }

        .progress-line.done {
            background: var(--success);
        }

        .detail-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 5000;
            display: none;
            overflow-y: auto;
            padding: 20px;
        }

        .detail-overlay.active {
            display: block;
        }

        .detail-panel {
            background: var(--white);
            border-radius: 24px;
            max-width: 680px;
            margin: 0 auto;
            padding: 40px;
        }

        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 24px;
        }

        .detail-close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: var(--white);
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 24px;
        }

        .detail-item {
            background: var(--bg);
            border-radius: 12px;
            padding: 14px;
        }

        .detail-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 14px;
            font-weight: 600;
        }

        .detail-desc {
            background: var(--bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.7;
        }

        .empty-state {
            padding: 60px 20px;
            text-align: center;
        }

        .empty-state .emoji {
            font-size: 52px;
            display: block;
            margin-bottom: 18px;
        }

        .empty-state p {
            font-size: 15px;
            color: var(--text-light);
            margin-bottom: 22px;
        }

        .btn-primary {
            padding: 12px 28px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .api-error {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 12px;
            padding: 14px 18px;
            font-size: 14px;
            color: var(--danger);
            margin-bottom: 20px;
            display: none;
        }

        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0
            }

            100% {
                background-position: -200% 0
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media(max-width:768px) {
            .topbar {
                padding: 0 15px;
            }

            .main-content {
                padding: 15px;
            }

            .page-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .detail-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="topbar">
        <div class="hamburger-menu">
            <button class="hamburger-btn" onclick="toggleMenu()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <line x1="3" y1="6" x2="21" y2="6" />
                    <line x1="3" y1="12" x2="21" y2="12" />
                    <line x1="3" y1="18" x2="21" y2="18" />
                </svg>
            </button>
            <div class="logo-section">
                <div
                    style="width:45px;height:45px;border-radius:12px;display:flex;align-items:center;justify-content:center;">
                    <svg width="45" height="45" viewBox="0 0 24 24" fill="none">
                        <defs>
                            <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
                                <stop offset="0%" stop-color="#6366f1" />
                                <stop offset="100%" stop-color="#8b5cf6" />
                            </linearGradient>
                        </defs>
                        <path d="M12 2L4 5V11C4 16 7.5 20 12 22C16.5 20 20 16 20 11V5L12 2Z" fill="url(#g1)" />
                        <path d="M9.5 12.5L11 14L14.5 10.5" stroke="white" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                </div>
                <span class="logo-text">SafeReport</span>
            </div>
            <div id="hamburgerDropdown" class="hamburger-menu-dropdown">
                <ul style="list-style:none;padding:8px 0;">
                    <li><a href="user-dashboard.html" class="menu-link" onclick="closeMenu()"><svg class="menu-icon"
                                viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <rect x="3" y="3" width="7" height="7" />
                                <rect x="14" y="3" width="7" height="7" />

                                <rect x="3" y="14" width="7" height="7" />
                            </svg>Dashboard</a></li>
                    <li><a href="submit-complaint.html" class="menu-link" onclick="closeMenu()"><svg class="menu-icon"

                                <line x1="12" y1="8" x2="12" y2="16" />
                                <line x1="8" y1="12" x2="16" y2="12" />

                    <li><a href="my-complaints.html" class="menu-link active" onclick="closeMenu()"><svg

                    <li><a href="complaint-status.html" class="menu-link" onclick="closeMenu()"><svg class="menu-icon"
                                viewBox="0 0 24 24" fill="none" stroke="currentColor">

                                    stroke-linejoin="round" />
                            </svg>Track Status</a></li>
                    <li><a href="notifications.html" class="menu-link" onclick="closeMenu()"><svg class="menu-icon"
                                viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                                <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                            </svg>Notifications</a></li>
                    <li><a href="user-profile.html" class="menu-link" onclick="closeMenu()"><svg class="menu-icon"
                                viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                                <circle cx="12" cy="7" r="4" />
                            </svg>My Profile</a></li>
                    <li><a href="../login.html" class="menu-link" onclick="logoutUser(); return false;"><svg
                                class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                                <polyline points="16 17 21 12 16 7" />
                                <line x1="21" y1="12" x2="9" y2="12" />
                            </svg>Logout</a></li>
                </ul>
            </div>
        </div>
        <div class="topbar-right">
            <div class="user-menu" onclick="toggleUserMenu()">
                <div class="user-avatar">--</div>
                <div class="user-info">
                    <div class="user-name">…</div>
                    <div class="user-role">user</div>
                </div>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="6 9 12 15 18 9" />
                </svg>
                <div id="userMenuDropdown" class="user-menu-dropdown">
                    <a href="user-profile.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">

                    <a href="../login.html" onclick="logoutUser(); return false;"><svg viewBox="0 0 24 24" fill="none"

                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />

    <div class="main-content">
        <div class="page-header">
            <div>
                <h1 class="page-title">My Complaints 📋</h1>
                <p class="page-subtitle">All complaints you have filed</p>
            </div>
            <a href="submit-complaint.html" class="btn-primary">+ New Complaint</a>
        </div>

        <div id="apiError" class="api-error"></div>

        <div class="stat-tabs" id="statTabs">
            <button class="stat-tab active" onclick="filterByStatus('', this)"><span id="tabAll">0</span>All</button>
            <button class="stat-tab" onclick="filterByStatus('NEW', this)"><span id="tabNew">0</span>New</button>
            <button class="stat-tab" onclick="filterByStatus('IN_PROGRESS', this)"><span id="tabIP">0</span>In
                Progress</button>
            <button class="stat-tab" onclick="filterByStatus('RESOLVED', this)"><span
                    id="tabResolved">0</span>Resolved</button>
            <button class="stat-tab" onclick="filterByStatus('CLOSED', this)"><span
                    id="tabClosed">0</span>Closed</button>
        </div>

        <div class="filter-bar">
            <select id="sortSelect" onchange="applyFilters()">
                <option value="newest">Newest First</option>
                <option value="oldest">Oldest First</option>
                <option value="priority">By Priority</option>
            </select>
            <select id="catFilter" onchange="applyFilters()">
                <option value="">All Categories</option>
                <option value="Domestic Violence">Domestic Violence</option>
                <option value="Workplace Harassment">Workplace Harassment</option>
                <option value="Cyberbullying">Cyberbullying</option>
                <option value="Public Harassment">Public Harassment</option>
                <option value="Sexual Assault">Sexual Assault</option>
                <option value="Stalking">Stalking</option>
                <option value="Other">Other</option>
            </select>
            <button class="btn-reset" onclick="resetFilters()">Reset</button>
        </div>

        <div class="complaints-grid" id="complaintsGrid">
            <!-- skeleton loader -->
            <div style="display:flex;flex-direction:column;gap:16px;" id="skeletonLoader">
                <div style="height:160px;" class="skeleton"></div>
                <div style="height:160px;" class="skeleton"></div>
                <div style="height:160px;" class="skeleton"></div>
            </div>
        </div>
    </div>

    <!-- Detail overlay -->
    <div class="detail-overlay" id="detailOverlay">
        <div class="detail-panel" id="detailPanel"></div>
    </div>

    <script src="../api.js"></script>
    <script>
        let allComplaints = [];
        let activeStatus = "";
        const PRIORITY_ORDER = { CRITICAL: 0, HIGH: 1, MEDIUM: 2, LOW: 3 };
        const STATUS_STEPS = ["SUBMITTED", "UNDER_REVIEW", "ASSIGNED", "INVESTIGATING", "RESOLVED", "CLOSED"];

        window.addEventListener("load", async () => {
            if (!requireAuth()) return;
            document.body.style.visibility = "visible";
            initMenus();
            populateTopbar();
            await loadComplaints();
        });

        /* ── Fetch all user complaints from backend ── */
        async function loadComplaints() {
            try {
                const res = await apiFetch("/complaints/my");
                if (!res.ok) throw new Error(res.status);
                const json = await res.json();
                allComplaints = json.data?.content || json.data || [];
                updateTabs();
                renderCards(allComplaints);
            } catch (err) {
                document.getElementById("skeletonLoader").style.display = "none";
                const el = document.getElementById("apiError");
                el.textContent = "⚠️ Could not load complaints. Make sure the backend is running.";
                el.style.display = "block";
            }
        }

        function updateTabs() {
            document.getElementById("tabAll").textContent = allComplaints.length;
            document.getElementById("tabNew").textContent = allComplaints.filter(c => c.status === "SUBMITTED").length;
            document.getElementById("tabIP").textContent = allComplaints.filter(c => ["INVESTIGATING", "ASSIGNED", "UNDER_REVIEW"].includes(c.status)).length;
            document.getElementById("tabResolved").textContent = allComplaints.filter(c => c.status === "RESOLVED").length;
            document.getElementById("tabClosed").textContent = allComplaints.filter(c => c.status === "CLOSED").length;
        }

        function filterByStatus(status, el) {
            activeStatus = status;
            document.querySelectorAll(".stat-tab").forEach(t => t.classList.remove("active"));
            el.classList.add("active");
            applyFilters();
        }

        function applyFilters() {
            let list = [...allComplaints];
            if (activeStatus) {
                if (activeStatus === "INVESTIGATING") list = list.filter(c => ["INVESTIGATING", "ASSIGNED", "UNDER_REVIEW"].includes(c.status));
                else list = list.filter(c => c.status === activeStatus);
            }
            const cat = document.getElementById("catFilter").value;
            if (cat) list = list.filter(c => c.categoryName === cat);
            const sort = document.getElementById("sortSelect").value;
            if (sort === "newest") list.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            if (sort === "oldest") list.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
            if (sort === "priority") list.sort((a, b) => (PRIORITY_ORDER[a.priority] || 9) - (PRIORITY_ORDER[b.priority] || 9));
            renderCards(list);
        }

        function resetFilters() {
            activeStatus = "";
            document.querySelectorAll(".stat-tab").forEach(t => t.classList.remove("active"));
            document.querySelector(".stat-tab").classList.add("active");
            document.getElementById("catFilter").value = "";
            document.getElementById("sortSelect").value = "newest";
            renderCards(allComplaints);
        }

        function stepIndex(status) {
            const i = STATUS_STEPS.indexOf(status);
            return i >= 0 ? i : (status === "CLOSED" ? 4 : 0);
        }

        function renderCards(list) {
            document.getElementById("skeletonLoader") && (document.getElementById("skeletonLoader").remove());
            const grid = document.getElementById("complaintsGrid");
            if (!list.length) {
                grid.innerHTML = `<div class="empty-state"><span class="emoji">📭</span><p>No complaints found.</p><a href="submit-complaint.html" class="btn-primary">Submit One Now</a></div>`;
                return;
            }
            grid.innerHTML = list.map((c, i) => {
                const trackingId = c.trackingId || ("SR-" + String(c.id).padStart(5, "0"));
                const cur = stepIndex(c.status);
                const timeline = STATUS_STEPS.map((s, idx) => {
                    const cls = idx < cur ? "done" : (idx === cur ? "active" : "");
                    return `<div class="progress-step"><div class="progress-dot ${cls}"></div><div class="progress-lbl">${s.replace(/_/g, " ")}</div></div>
                        ${idx < STATUS_STEPS.length - 1 ? `<div class="progress-line ${idx < cur ? 'done' : ''}"></div>` : ""}`;
                }).join("");
                const pClass = { CRITICAL: "p-critical", HIGH: "p-high", MEDIUM: "p-medium", LOW: "p-low" }[c.priority] || "p-low";
                return `<div class="complaint-card" style="animation-delay:${i * 0.06}s">
                <div class="card-header">
                    <div class="card-id">${trackingId}</div>
                    <div class="card-badges">
                        <span class="status-badge ${statusClass(c.status)}">${c.status.replace(/_/g, " ")}</span>
                        <span class="priority-badge ${pClass}">${c.priority}</span>
                    </div>
                </div>
                <div class="card-title">${escHtml(c.title)}</div>
                <div class="card-desc">${escHtml(c.description)}</div>
                <div class="card-meta">
                    <span>📂 ${c.categoryName || "—"}</span>
                    <span>📅 ${formatDate(c.createdAt)}</span>
                    ${c.location ? `<span>📍 ${escHtml(c.location)}</span>` : ""}
                </div>
                <div class="progress-track">${timeline}</div>
                <div class="card-footer">
                    <button class="btn-sm primary" onclick="openDetail(${c.id})">View Details</button>
                </div>
            </div>`;
            }).join("");
        }

        /* ── Detail overlay (fetch single complaint for full data) ── */
        async function openDetail(id) {
            const panel = document.getElementById("detailPanel");
            panel.innerHTML = `<div style="text-align:center;padding:60px;color:var(--text-light);">Loading…</div>`;
            document.getElementById("detailOverlay").classList.add("active");

            try {
                const res = await apiFetch("/complaints/" + id);
                if (res.ok) {
                    const json = await res.json();
                    renderDetailPanel(json.data || json);
                } else {
                    renderDetailPanel(allComplaints.find(x => x.id === id));
                }
            } catch {
                renderDetailPanel(allComplaints.find(x => x.id === id));
            }
        }

        function renderDetailPanel(c) {
            if (!c) { document.getElementById("detailPanel").innerHTML = `<p style="padding:40px;color:var(--danger);">Could not load details.</p>`; return; }
            const pClass = { CRITICAL: "p-critical", HIGH: "p-high", MEDIUM: "p-medium", LOW: "p-low" }[c.priority] || "p-low";
            document.getElementById("detailPanel").innerHTML = `
            <div class="detail-header">
                <div>
                    <div style="font-size:12px;font-weight:700;color:var(--primary);margin-bottom:6px;">${c.trackingId || ("SR-" + String(c.id).padStart(5, "0"))}</div>
                    <h2 style="font-size:20px;font-weight:800;">${escHtml(c.title)}</h2>
                </div>
                <button class="detail-close" onclick="closeDetail()">✕</button>
            </div>
            <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;">
                <span class="status-badge ${statusClass(c.status)}">${c.status.replace(/_/g, " ")}</span>
                <span class="priority-badge ${pClass}">${c.priority}</span>
                ${c.anonymous ? '<span class="status-badge" style="background:rgba(100,116,139,0.1);color:#475569;">Anonymous</span>' : ""}
            </div>
            <div class="detail-grid">
                <div class="detail-item"><div class="detail-label">Category</div><div class="detail-value">${c.categoryName || "—"}</div></div>
                <div class="detail-item"><div class="detail-label">Submitted</div><div class="detail-value">${formatDate(c.createdAt)}</div></div>
                <div class="detail-item"><div class="detail-label">Incident Date</div><div class="detail-value">${c.incidentDate || "—"}</div></div>
                <div class="detail-item"><div class="detail-label">Location</div><div class="detail-value">${escHtml(c.location || "—")}</div></div>
                <div class="detail-item"><div class="detail-label">Target Resolution</div><div class="detail-value">${c.targetResolutionDate || "—"}</div></div>
                <div class="detail-item"><div class="detail-label">Assigned To</div><div class="detail-value">${escHtml(c.assignedAuthorityName || "Pending")}</div></div>
            </div>
            <div style="font-size:13px;font-weight:600;margin-bottom:10px;">Description</div>
            <div class="detail-desc">${escHtml(c.description)}</div>
            <div style="display:flex;gap:10px;justify-content:flex-end;">
                <a href="complaint-status.html?id=${c.id}" class="btn-sm primary" style="text-decoration:none;">Track Status →</a>
            </div>`;
        }

        function closeDetail() { document.getElementById("detailOverlay").classList.remove("active"); }
        document.addEventListener("keydown", e => { if (e.key === "Escape") closeDetail(); });

        function escHtml(s) { return (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
    </script>
</body>

</html>
