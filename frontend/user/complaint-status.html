<!DOCTYPE html>
<html lang="en">
<head>
    <style>body{visibility:hidden}</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeReport | Track Status</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary:#6366f1; --secondary:#8b5cf6; --success:#10b981; --warning:#f59e0b; --danger:#ef4444; --text:#1e293b; --text-light:#64748b; --border:#e2e8f0; --bg:#f8fafc; --white:#ffffff; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); }
        .topbar { position:fixed; top:0; left:0; right:0; height:70px; background:rgba(255,255,255,0.95); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 30px; z-index:1000; gap:20px; }
        .hamburger-menu { display:flex; align-items:center; gap:15px; position:relative; }
        .hamburger-btn { display:flex; background:none; border:none; cursor:pointer; padding:8px; border-radius:8px; }
        .hamburger-btn svg { width:24px; height:24px; stroke:var(--text); stroke-width:2; }
        .logo-text { font-size:20px; font-weight:800; background:linear-gradient(135deg,var(--primary),var(--secondary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .logo-section { display:flex; align-items:center; gap:12px; }
        .hamburger-menu-dropdown { position:absolute; top:100%; left:0; background:var(--white); border:1px solid var(--border); border-radius:12px; min-width:220px; margin-top:8px; box-shadow:0 10px 30px rgba(0,0,0,0.12); display:none; z-index:2000; overflow:hidden; }
        .hamburger-menu-dropdown.active { display:block; }
        .hamburger-menu-dropdown .menu-link { display:flex; align-items:center; gap:12px; padding:14px 20px; color:var(--text); text-decoration:none; font-size:14px; transition:all 0.2s; }
        .hamburger-menu-dropdown .menu-link:hover { background:var(--bg); padding-left:22px; }
        .hamburger-menu-dropdown .menu-link.active { background:rgba(99,102,241,0.1); color:var(--primary); }
        .menu-icon { width:18px; height:18px; stroke-width:2; flex-shrink:0; }
        .topbar-right { display:flex; align-items:center; }
        .user-menu { display:flex; align-items:center; gap:12px; padding:8px 15px; border-radius:12px; background:var(--white); border:1px solid var(--border); cursor:pointer; position:relative; }
        .user-avatar { width:38px; height:38px; border-radius:10px; background:linear-gradient(135deg,var(--primary),var(--secondary)); display:flex; align-items:center; justify-content:center; color:white; font-weight:700; font-size:14px; }
        .user-info { display:flex; flex-direction:column; }
        .user-name { font-size:14px; font-weight:600; }
        .user-role { font-size:12px; color:var(--text-light); }
        .user-menu-dropdown { position:absolute; top:100%; right:0; background:var(--white); border:1px solid var(--border); border-radius:12px; min-width:190px; margin-top:8px; box-shadow:0 10px 30px rgba(0,0,0,0.12); display:none; z-index:2000; overflow:hidden; }
        .user-menu-dropdown.active { display:block; }
        .user-menu-dropdown a { display:flex; align-items:center; gap:12px; padding:14px 18px; color:var(--text); text-decoration:none; font-size:14px; border-bottom:1px solid var(--border); transition:all 0.2s; }
        .user-menu-dropdown a:last-child { border-bottom:none; }
        .user-menu-dropdown a:hover { background:var(--bg); }
        .user-menu-dropdown svg { width:16px; height:16px; stroke:var(--text-light); }
        .main-content { margin-top:70px; padding:30px; max-width:900px; margin-left:auto; margin-right:auto; }
        .page-title { font-size:28px; font-weight:800; margin-bottom:6px; }
        .page-subtitle { font-size:15px; color:var(--text-light); margin-bottom:30px; }
        .search-bar { background:var(--white); border:1px solid var(--border); border-radius:16px; padding:20px 24px; margin-bottom:28px; display:flex; gap:12px; align-items:center; }
        .search-bar input { flex:1; padding:12px 16px; border:1.5px solid var(--border); border-radius:12px; font-size:14px; font-family:'Inter',sans-serif; }
        .search-bar input:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(99,102,241,0.1); }
        .btn-search { padding:12px 24px; border:none; border-radius:12px; background:linear-gradient(135deg,var(--primary),var(--secondary)); color:white; font-size:14px; font-weight:700; cursor:pointer; white-space:nowrap; }
        .complaint-card { background:var(--white); border:1px solid var(--border); border-radius:18px; padding:24px; margin-bottom:16px; transition:all 0.3s; }
        .complaint-card:hover { box-shadow:0 8px 30px rgba(0,0,0,0.07); }
        .card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; flex-wrap:wrap; gap:8px; }
        .card-id { font-size:13px; font-weight:700; color:var(--primary); background:rgba(99,102,241,0.08); padding:4px 12px; border-radius:8px; }
        .card-badges { display:flex; gap:8px; flex-wrap:wrap; }
        .status-badge { display:inline-block; padding:5px 12px; border-radius:8px; font-size:12px; font-weight:600; }
        .priority-badge { display:inline-block; padding:5px 12px; border-radius:8px; font-size:12px; font-weight:700; }
        .status-new { background:rgba(59,130,246,0.1); color:#1e40af; } .status-review { background:rgba(245,158,11,0.1); color:#92400e; } .status-assigned { background:rgba(139,92,246,0.1); color:#5b21b6; } .status-progress { background:rgba(245,158,11,0.1); color:#92400e; } .status-resolved { background:rgba(16,185,129,0.1); color:#065f46; } .status-closed { background:rgba(100,116,139,0.1); color:#475569; }
        .p-critical { background:rgba(124,58,237,0.1); color:#6d28d9; } .p-high { background:rgba(239,68,68,0.1); color:#b91c1c; } .p-medium { background:rgba(245,158,11,0.1); color:#92400e; } .p-low { background:rgba(100,116,139,0.1); color:#475569; }
        .card-title { font-size:17px; font-weight:700; margin-bottom:8px; }
        .card-meta { display:flex; gap:18px; flex-wrap:wrap; font-size:13px; color:var(--text-light); margin-bottom:20px; }
        /* Timeline */
        .timeline { border-top:1px solid var(--border); padding-top:20px; }
        .tl-step { display:flex; gap:16px; margin-bottom:20px; }
        .tl-left { display:flex; flex-direction:column; align-items:center; width:28px; flex-shrink:0; }
        .tl-dot { width:28px; height:28px; border-radius:50%; border:2px solid var(--border); background:var(--white); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; }
        .tl-dot.done { background:var(--success); border-color:var(--success); color:white; }
        .tl-dot.active { background:var(--primary); border-color:var(--primary); color:white; box-shadow:0 0 0 4px rgba(99,102,241,0.15); }
        .tl-line { flex:1; width:2px; background:var(--border); min-height:20px; margin-top:4px; }
        .tl-line.done { background:var(--success); }
        .tl-right { padding-top:3px; flex:1; }
        .tl-title { font-size:14px; font-weight:700; margin-bottom:2px; }
        .tl-sub { font-size:12px; color:var(--text-light); }
        .tl-date { font-size:11px; color:var(--text-light); margin-top:2px; }
        /* Updates section */
        .updates-section { margin-top:16px; border-top:1px solid var(--border); padding-top:16px; }
        .update-item { background:var(--bg); border-radius:10px; padding:14px; margin-bottom:10px; font-size:14px; }
        .update-meta { font-size:12px; color:var(--text-light); margin-top:6px; }
        .card-footer { display:flex; gap:10px; justify-content:flex-end; border-top:1px solid var(--border); padding-top:14px; margin-top:16px; }
        .btn-sm { padding:7px 16px; border-radius:9px; border:1.5px solid var(--border); background:var(--white); font-size:13px; font-weight:600; cursor:pointer; transition:all 0.2s; color:var(--text); text-decoration:none; }
        .btn-sm:hover { border-color:var(--primary); color:var(--primary); }
        .btn-sm.primary { background:linear-gradient(135deg,var(--primary),var(--secondary)); color:white; border-color:transparent; }
        .empty-state { text-align:center; padding:60px 20px; color:var(--text-light); }
        .empty-state .emoji { font-size:52px; display:block; margin-bottom:16px; }
        .api-error { background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.2); border-radius:12px; padding:14px 18px; font-size:14px; color:var(--danger); margin-bottom:20px; display:none; }
        @media(max-width:768px) { .topbar { padding:0 15px; } .main-content { padding:15px; } .search-bar { flex-direction:column; } }
    </style>
</head>
<body>

<div class="topbar">
    <div class="hamburger-menu">
        <button class="hamburger-btn" onclick="toggleMenu()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <div class="logo-section">
            <div style="width:45px;height:45px;border-radius:12px;display:flex;align-items:center;justify-content:center;"><svg width="45" height="45" viewBox="0 0 24 24" fill="none"><defs><linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient></defs><path d="M12 2L4 5V11C4 16 7.5 20 12 22C16.5 20 20 16 20 11V5L12 2Z" fill="url(#g1)"/><path d="M9.5 12.5L11 14L14.5 10.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
            <span class="logo-text">SafeReport</span>
        </div>
        <div id="hamburgerDropdown" class="hamburger-menu-dropdown">
            <ul style="list-style:none;padding:8px 0;">
                <li><a href="user-dashboard.html" class="menu-link" onclick="closeMenu()"><svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a></li>
                <li><a href="submit-complaint.html" class="menu-link" onclick="closeMenu()"><svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Submit Complaint</a></li>
                <li><a href="my-complaints.html" class="menu-link" onclick="closeMenu()"><svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>My Complaints</a></li>
                <li><a href="complaint-status.html" class="menu-link active" onclick="closeMenu()"><svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" stroke-linecap="round" stroke-linejoin="round"/></svg>Track Status</a></li>
                <li><a href="notifications.html" class="menu-link" onclick="closeMenu()"><svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>Notifications</a></li>
                <li><a href="user-profile.html" class="menu-link" onclick="closeMenu()"><svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>My Profile</a></li>
                <li><a href="../login.html" class="menu-link" onclick="logoutUser(); return false;"><svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Logout</a></li>
            </ul>
        </div>
    </div>
    <div class="topbar-right">
        <div class="user-menu" onclick="toggleUserMenu()">
            <div class="user-avatar">--</div>
            <div class="user-info"><div class="user-name">…</div><div class="user-role">user</div></div>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            <div id="userMenuDropdown" class="user-menu-dropdown">
                <a href="user-profile.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>My Profile</a>
                <a href="../login.html" onclick="logoutUser(); return false;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Logout</a>
            </div>
        </div>
    </div>
</div>

<div class="main-content">
    <h1 class="page-title">Track Complaint Status 🔍</h1>
    <p class="page-subtitle">Search by complaint ID or browse all your complaints below</p>

    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Enter complaint ID (e.g. SR-00001) or keyword…" onkeydown="if(event.key==='Enter') doSearch()">
        <button class="btn-search" onclick="doSearch()">Search</button>
    </div>

    <div id="apiError" class="api-error"></div>
    <div id="complaintsContainer"><div style="text-align:center;padding:40px;color:var(--text-light);">Loading…</div></div>
</div>

<script src="../api.js"></script>
<script>
    let allComplaints = [];
    const STATUS_STEPS  = ["NEW","UNDER_REVIEW","ASSIGNED","IN_PROGRESS","RESOLVED"];
    const STEP_LABELS   = ["Submitted","Under Review","Assigned","In Progress","Resolved"];

    window.addEventListener("load", async () => {
        if (!requireAuth()) return;
        document.body.style.visibility = "visible";
        initMenus();
        populateTopbar();
        await loadComplaints();
        // Deep-link: complaint-status.html?id=5
        const idParam = new URLSearchParams(window.location.search).get("id");
        if (idParam) {
            document.getElementById("searchInput").value = "SR-" + String(idParam).padStart(5,"0");
            doSearch();
        }
    });

    async function loadComplaints() {
        try {
            const res = await apiFetch("/complaints/my");
            if (!res.ok) throw new Error();
            let data = await res.json();
            allComplaints = data.content || data;
            renderComplaints(allComplaints);
        } catch {
            document.getElementById("apiError").textContent = "⚠️ Could not load complaints.";
            document.getElementById("apiError").style.display = "block";
            document.getElementById("complaintsContainer").innerHTML = "";
        }
    }

    function doSearch() {
        const q = document.getElementById("searchInput").value.trim().toLowerCase();
        if (!q) { renderComplaints(allComplaints); return; }
        const filtered = allComplaints.filter(c =>
            ("sr-" + String(c.id).padStart(5,"0")) === q ||
            (c.subject||"").toLowerCase().includes(q) ||
            (c.category||"").toLowerCase().includes(q) ||
            (c.status||"").toLowerCase().includes(q)
        );
        renderComplaints(filtered);
    }

    function renderComplaints(list) {
        const el = document.getElementById("complaintsContainer");
        if (!list.length) {
            el.innerHTML = `<div class="empty-state"><span class="emoji">🔍</span><p>No complaints found matching your search.</p></div>`;
            return;
        }
        el.innerHTML = list.map(c => {
            const trackId = "SR-" + String(c.id).padStart(5,"0");
            const cur = STATUS_STEPS.indexOf(c.status);
            const pClass = { CRITICAL:"p-critical", HIGH:"p-high", MEDIUM:"p-medium", LOW:"p-low" }[c.priority] || "p-low";

            const timelineHtml = STATUS_STEPS.map((s, i) => {
                const done   = i < cur;
                const active = i === cur;
                const dotCls = done ? "done" : (active ? "active" : "");
                const lineCls = done ? "done" : "";
                return `<div class="tl-step">
                    <div class="tl-left">
                        <div class="tl-dot ${dotCls}">${done ? "✓" : (active ? "●" : String(i+1))}</div>
                        ${i < STATUS_STEPS.length - 1 ? `<div class="tl-line ${lineCls}"></div>` : ""}
                    </div>
                    <div class="tl-right">
                        <div class="tl-title" style="${i <= cur ? 'color:var(--text)' : 'color:var(--text-light)'}">${STEP_LABELS[i]}</div>
                        <div class="tl-sub">${done ? "Completed" : (active ? "Current stage" : "Pending")}</div>
                    </div>
                </div>`;
            }).join("");

            // Show authority updates if available
            const updatesHtml = (c.updates && c.updates.length) ? `
                <div class="updates-section">
                    <div style="font-size:13px;font-weight:700;margin-bottom:12px;">Authority Updates</div>
                    ${c.updates.slice(0,3).map(u => `
                        <div class="update-item">
                            <div>${escHtml(u.description || u.message || "")}</div>
                            <div class="update-meta">by ${escHtml(u.authorityName || "Authority")} · ${formatDate(u.createdAt)}</div>
                        </div>`).join("")}
                </div>` : "";

            return `<div class="complaint-card">
                <div class="card-header">
                    <div class="card-id">${trackId}</div>
                    <div class="card-badges">
                        <span class="status-badge ${statusClass(c.status)}">${c.status.replace(/_/g," ")}</span>
                        <span class="priority-badge ${pClass}">${c.priority}</span>
                    </div>
                </div>
                <div class="card-title">${escHtml(c.subject)}</div>
                <div class="card-meta">
                    <span>📂 ${c.category}</span>
                    <span>📅 Submitted ${formatDate(c.createdAt)}</span>
                    ${c.targetResolutionDate ? `<span>🎯 Target: ${formatDate(c.targetResolutionDate)}</span>` : ""}
                    ${c.assignedAuthority ? `<span>👤 ${escHtml(c.assignedAuthority)}</span>` : ""}
                </div>
                <div class="timeline">${timelineHtml}</div>
                ${updatesHtml}
                <div class="card-footer">
                    <a href="my-complaints.html" class="btn-sm">← All Complaints</a>
                </div>
            </div>`;
        }).join("");
    }

    function escHtml(s) { return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
</script>
</body>
</html>
