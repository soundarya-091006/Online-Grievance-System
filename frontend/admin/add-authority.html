<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeReport | Add Authority</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --accent: #ec4899;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --bg: #f8fafc;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .form-card {
            background: var(--white);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
        }

        .form-header {
            margin-bottom: 30px;
            text-align: center;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }

        .form-title {
            font-size: 24px;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 8px;
        }

        .form-subtitle {
            color: var(--text-light);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            color: var(--text);
            margin-bottom: 8px;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 6px;
            border: none;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-secondary {
            background: var(--white);
            color: var(--primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-card">
            <div class="form-header">
                <div class="logo-text">SafeReport</div>
                <h1 class="form-title">Add Authority</h1>
                <p class="form-subtitle">Create a new authority/department</p>
            </div>

            <form id="addAuthorityForm" onsubmit="createAuthority(event)">
                <div class="form-group">
                    <label class="form-label">Authority Name</label>
                    <input type="text" class="form-control" id="authorityName" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="authorityEmail" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Department</label>
                    <input type="text" class="form-control" id="authorityDepartment" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Phone Number</label>
                    <input type="tel" class="form-control" id="authorityPhone">
                </div>

                <div class="form-group">
                    <label class="form-label">Address</label>
                    <textarea class="form-control" id="authorityAddress" style="resize: vertical; min-height: 80px;"></textarea>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="goBack()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create Authority</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function createAuthority(event) {
            event.preventDefault();

            const authorities = JSON.parse(localStorage.getItem("authorities")) || [];
            
            const newAuthority = {
                id: Date.now().toString(),
                name: document.getElementById("authorityName").value,
                email: document.getElementById("authorityEmail").value,
                department: document.getElementById("authorityDepartment").value,
                phone: document.getElementById("authorityPhone").value,
                address: document.getElementById("authorityAddress").value,
                createdAt: new Date().toLocaleString()
            };

            authorities.push(newAuthority);
            localStorage.setItem("authorities", JSON.stringify(authorities));

            alert("Authority created successfully");
            window.location.href = "authority-management.html";
        }

        function goBack() {
            window.location.href = "authority-management.html";
        }
    </script>
</body>
</html>
