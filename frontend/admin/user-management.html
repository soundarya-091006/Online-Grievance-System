<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeReport | User Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --accent: #ec4899;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --bg: #f8fafc;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 1000;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .admin-badge {
            background: linear-gradient(135deg, var(--danger), var(--accent));
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 70px;
            width: 280px;
            height: calc(100vh - 70px);
            background: var(--white);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            z-index: 500;
            padding: 20px 0;
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: var(--text-light);
            text-decoration: none;
            transition: all 0.3s;
            border-left: 3px solid transparent;
        }

        .sidebar-menu a:hover,
        .sidebar-menu a.active {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            border-left-color: var(--primary);
            font-weight: 600;
        }

        .main-content {
            margin-left: 280px;
            margin-top: 70px;
            padding: 30px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 800;
            color: var(--text);
        }

        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--primary);
            color: white;
        }

        .btn:hover {
            background: var(--primary-dark);
        }

        .user-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .user-card {
            background: var(--white);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 20px;
            transition: all 0.3s;
        }

        .user-card:hover {
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.1);
            transform: translateY(-2px);
        }

        .user-name {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 10px;
        }

        .user-info {
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 12px;
            line-height: 1.6;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .action-btn {
            flex: 1;
            padding: 8px;
            border: 1px solid var(--border);
            background: var(--white);
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            color: var(--primary);
            transition: all 0.3s;
        }

        .action-btn:hover {
            background: var(--bg);
            border-color: var(--primary);
        }

        .logout-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .main-content {
                margin-left: 250px;
                padding: 20px;
            }

            .user-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div style="display: flex; align-items: center;">
            <div class="logo-text">SafeReport</div>
            <span class="admin-badge">ADMIN</span>
        </div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <span id="userEmail" style="font-size: 14px; color: var(--text-light);"></span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="sidebar">
        <ul class="sidebar-menu">
            <li><a href="admin-dashboard.html">Dashboard</a></li>
            <li><a href="all-complaints.html">All Complaints</a></li>
            <li><a href="pending-review.html">Pending Review</a></li>
            <li><a href="assigned-cases.html">Assigned Cases</a></li>
            <li><a href="user-management.html" class="active">User Management</a></li>
            
            <li><a href="authority-management.html">Authorities</a></li>
            <li><a href="reports.html">Reports</a></li>
            <li><a href="audit-logs.html">Audit Logs</a></li>
            <li><a href="settings.html">Settings</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="page-header">
            <h1 class="page-title">User Management</h1>
            <button class="btn" onclick="addUser()">+ Add User</button>
        </div>

        <div class="user-grid" id="userGrid"></div>
    </div>

    <script>
        const API = "http://localhost:8080/api";

        function getToken() { return localStorage.getItem("token"); }

        function checkAdminAccess() {
            const role = localStorage.getItem("role");
            if (!getToken() || role !== "ADMIN") {
                window.location.href = "../login.html";
                return false;
            }
            const name = localStorage.getItem("fullName") || "Admin";
            document.getElementById("userEmail").innerText = name;
            return true;
        }

        async function loadUsers() {
            try {
                const res = await fetch(API + "/admin/users", {
                    headers: { "Authorization": "Bearer " + getToken() }
                });
                const json = await res.json();
                if (!json.success) { console.error(json.message); return; }
                const users = json.data || [];
                const grid = document.getElementById("userGrid");

                if (users.length === 0) {
                    grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-light);">No users found</div>`;
                    return;
                }

                grid.innerHTML = users.map(user => {
                    const esc = (s) => (s||'').replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
                    return `
                        <div class="user-card">
                            <div class="user-name">${esc(user.fullName || user.email)}</div>
                            <div class="user-info">
                                <div><strong>Email:</strong> ${esc(user.email)}</div>
                                <div><strong>Phone:</strong> ${esc(user.phone || 'N/A')}</div>
                                <div><strong>Role:</strong> ${user.role || 'USER'}</div>
                                <div><strong>Status:</strong> <span style="color:${user.active ? 'var(--success)' : 'var(--danger)'}">${user.active ? 'Active' : 'Disabled'}</span></div>
                            </div>
                            <div class="action-buttons">
                                <button class="action-btn" onclick="toggleUserStatus(${user.id})">${user.active ? 'Disable' : 'Enable'}</button>
                                <button class="action-btn" onclick="deleteUser(${user.id})" style="color: var(--danger);">Delete</button>
                            </div>
                        </div>
                    `;
                }).join("");
            } catch(e) {
                console.error("Failed to load users:", e);
            }
        }

        function addUser() {
            alert("Users can self-register from the registration page. Admin/Authority accounts are pre-provisioned.");
        }

        async function toggleUserStatus(userId) {
            try {
                const res = await fetch(API + "/admin/users/" + userId + "/toggle-status", {
                    method: "PATCH",
                    headers: { "Authorization": "Bearer " + getToken() }
                });
                const json = await res.json();
                if (json.success) {
                    alert("User status updated!");
                    loadUsers();
                } else {
                    alert("Failed: " + json.message);
                }
            } catch(e) {
                alert("Error toggling user status: " + e.message);
            }
        }

        async function deleteUser(userId) {
            if (!confirm("Are you sure you want to delete this user?")) return;
            try {
                const res = await fetch(API + "/admin/users/" + userId, {
                    method: "DELETE",
                    headers: { "Authorization": "Bearer " + getToken() }
                });
                const json = await res.json();
                if (json.success) {
                    alert("User deleted successfully");
                    loadUsers();
                } else {
                    alert("Failed: " + json.message);
                }
            } catch(e) {
                alert("Error deleting user: " + e.message);
            }
        }

        function logout() {
            ["token","role","userId","fullName","email"].forEach(k => localStorage.removeItem(k));
            window.location.href = "../login.html";
        }

        window.addEventListener("DOMContentLoaded", () => {
            if (!checkAdminAccess()) return;
            loadUsers();
        });
    </script>
</body>
</html>
