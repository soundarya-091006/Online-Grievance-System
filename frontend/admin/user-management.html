<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeReport | User Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --accent: #ec4899;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --bg: #f8fafc;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 1000;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .admin-badge {
            background: linear-gradient(135deg, var(--danger), var(--accent));
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 70px;
            width: 280px;
            height: calc(100vh - 70px);
            background: var(--white);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            z-index: 500;
            padding: 20px 0;
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: var(--text-light);
            text-decoration: none;
            transition: all 0.3s;
            border-left: 3px solid transparent;
        }

        .sidebar-menu a:hover,
        .sidebar-menu a.active {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            border-left-color: var(--primary);
            font-weight: 600;
        }

        .main-content {
            margin-left: 280px;
            margin-top: 70px;
            padding: 30px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 800;
            color: var(--text);
        }

        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-secondary {
            background: var(--white);
            color: var(--primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg);
        }

        .table-container {
            background: var(--white);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            padding: 15px;
            background: var(--bg);
            border-bottom: 2px solid var(--border);
            font-weight: 600;
            font-size: 14px;
            color: var(--text);
            text-align: left;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid var(--border);
        }

        tr:hover {
            background: var(--bg);
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-active {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        .status-inactive {
            background: rgba(107, 114, 128, 0.1);
            color: var(--text-light);
        }

        .role-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            padding: 6px 12px;
            border: 1px solid var(--border);
            background: var(--white);
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            color: var(--primary);
            transition: all 0.3s;
        }

        .action-btn:hover {
            background: var(--bg);
            border-color: var(--primary);
        }

        .logout-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        @media (max-width: 1200px) {
            .sidebar {
                width: 250px;
            }

            .main-content {
                margin-left: 250px;
            }
        }

        @media (max-width: 768px) {
            .main-content {
                margin-left: 0;
                padding: 20px;
            }

            .sidebar {
                display: none;
            }

            table {
                font-size: 13px;
            }

            th, td {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div style="display: flex; align-items: center;">
            <div class="logo-text">SafeReport</div>
            <span class="admin-badge">ADMIN</span>
        </div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <span id="userEmail" style="font-size: 14px; color: var(--text-light);"></span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="sidebar">
        <ul class="sidebar-menu">
            <li><a href="../admin-dashboard.html">Dashboard</a></li>
            <li><a href="all-complaints.html">All Complaints</a></li>
            <li><a href="pending-review.html">Pending Review</a></li>
            <li><a href="assigned-cases.html">Assigned Cases</a></li>
            <li><a href="user-management.html" class="active">User Management</a></li>
            <li><a href="authority-management.html">Authorities</a></li>
            <li><a href="reports.html">Reports</a></li>
            <li><a href="audit-logs.html">Audit Logs</a></li>
            <li><a href="notifications.html">Notifications</a></li>
            <li><a href="settings.html">Settings</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="page-header">
            <h1 class="page-title">User Management</h1>
            <button class="btn btn-primary" onclick="addNewUser()">+ Add User</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Registered</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="usersList">
                    <tr>
                        <td colspan="6" style="text-align: center; padding: 40px;">Loading users...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function checkAdminAccess() {
            const currentUser = JSON.parse(localStorage.getItem("currentUser")) || {};
            if (currentUser.role !== "admin") {
                window.location.href = "../login.html";
            }
            document.getElementById("userEmail").innerText = currentUser.email || "Admin";
        }

        function loadUsers() {
            const users = JSON.parse(localStorage.getItem("users")) || [];
            const tbody = document.getElementById("usersList");

            if (users.length === 0) {
                tbody.innerHTML = `<tr>
                    <td colspan="6" style="text-align: center; padding: 40px; color: var(--text-light);">No users found</td>
                </tr>`;
                return;
            }

            tbody.innerHTML = users.map(user => `
                <tr>
                    <td>${user.name || 'N/A'}</td>
                    <td>${user.email}</td>
                    <td><span class="role-badge">${user.role}</span></td>
                    <td><span class="status-badge status-${user.status === 'active' ? 'active' : 'inactive'}">${user.status === 'active' ? 'Active' : 'Inactive'}</span></td>
                    <td>${user.createdAt || 'N/A'}</td>
                    <td>
                        <div class="action-buttons">
                            <button class="action-btn" onclick="editUser('${user.email}')">Edit</button>
                            <button class="action-btn" onclick="toggleUserStatus('${user.email}')">
                                ${user.status === 'active' ? 'Deactivate' : 'Activate'}
                            </button>
                            <button class="action-btn" onclick="deleteUser('${user.email}')" style="color: var(--danger);">Delete</button>
                        </div>
                    </td>
                </tr>
            `).join("");
        }

        function addNewUser() {
            window.location.href = "add-user.html";
        }

        function editUser(email) {
            alert("Edit user feature coming soon: " + email);
        }

        function toggleUserStatus(email) {
            const users = JSON.parse(localStorage.getItem("users")) || [];
            const user = users.find(u => u.email === email);
            
            if (user) {
                user.status = user.status === 'active' ? 'deactivated' : 'active';
                localStorage.setItem("users", JSON.stringify(users));
                loadUsers();
                alert(`User ${email} ${user.status === 'active' ? 'activated' : 'deactivated'}`);
            }
        }

        function deleteUser(email) {
            if (confirm(`Are you sure you want to delete user ${email}?`)) {
                let users = JSON.parse(localStorage.getItem("users")) || [];
                users = users.filter(u => u.email !== email);
                localStorage.setItem("users", JSON.stringify(users));
                loadUsers();
                alert("User deleted successfully");
            }
        }

        function logout() {
            localStorage.removeItem("currentUser");
            window.location.href = "../login.html";
        }

        window.addEventListener("DOMContentLoaded", () => {
            checkAdminAccess();
            loadUsers();
        });
    </script>
</body>
</html>
