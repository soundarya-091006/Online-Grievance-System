<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeReport | Audit Logs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --accent: #ec4899;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --bg: #f8fafc;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 1000;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .admin-badge {
            background: linear-gradient(135deg, var(--danger), var(--accent));
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 70px;
            width: 280px;
            height: calc(100vh - 70px);
            background: var(--white);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            z-index: 500;
            padding: 20px 0;
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: var(--text-light);
            text-decoration: none;
            transition: all 0.3s;
            border-left: 3px solid transparent;
        }

        .sidebar-menu a:hover,
        .sidebar-menu a.active {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            border-left-color: var(--primary);
            font-weight: 600;
        }

        .main-content {
            margin-left: 280px;
            margin-top: 70px;
            padding: 30px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 800;
            color: var(--text);
        }

        .filter-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .form-control {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
        }

        .logs-table {
            background: var(--white);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            padding: 15px;
            background: var(--bg);
            border-bottom: 2px solid var(--border);
            font-weight: 600;
            font-size: 14px;
            color: var(--text);
            text-align: left;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        tr:hover {
            background: var(--bg);
        }

        .log-action {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .action-create {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        .action-update {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
        }

        .action-delete {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .action-login {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
        }

        .logout-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        @media (max-width: 1200px) {
            .main-content {
                margin-left: 250px;
            }
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 20px;
            }

            table {
                font-size: 13px;
            }

            th, td {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div style="display: flex; align-items: center;">
            <div class="logo-text">SafeReport</div>
            <span class="admin-badge">ADMIN</span>
        </div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <span id="userEmail" style="font-size: 14px; color: var(--text-light);"></span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="sidebar">
        <ul class="sidebar-menu">
            <li><a href="../admin-dashboard.html">Dashboard</a></li>
            <li><a href="all-complaints.html">All Complaints</a></li>
            <li><a href="pending-review.html">Pending Review</a></li>
            <li><a href="assigned-cases.html">Assigned Cases</a></li>
            <li><a href="user-management.html">User Management</a></li>
            <li><a href="authority-management.html">Authorities</a></li>
            <li><a href="reports.html">Reports</a></li>
            <li><a href="audit-logs.html" class="active">Audit Logs</a></li>
            <li><a href="notifications.html">Notifications</a></li>
            <li><a href="settings.html">Settings</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="page-header">
            <h1 class="page-title">Audit Logs</h1>
        </div>

        <!-- Filters -->
        <div class="filter-group">
            <input type="text" class="form-control" placeholder="Filter by user..." id="userFilter">
            <input type="text" class="form-control" placeholder="Filter by action..." id="actionFilter">
            <input type="date" class="form-control" id="dateFilter">
            <select class="form-control" id="actionTypeFilter">
                <option value="">All Actions</option>
                <option value="create">Create</option>
                <option value="update">Update</option>
                <option value="delete">Delete</option>
                <option value="login">Login</option>
            </select>
        </div>

        <!-- Logs Table -->
        <div class="logs-table">
            <table>
                <thead>
                    <tr>
                        <th>Timestamp</th>
                        <th>User</th>
                        <th>Action</th>
                        <th>Target</th>
                        <th>Details</th>
                    </tr>
                </thead>
                <tbody id="logsBody">
                    <tr>
                        <td colspan="5" style="text-align: center; padding: 40px; color: var(--text-light);">No logs found</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function checkAdminAccess() {
            const currentUser = JSON.parse(localStorage.getItem("currentUser")) || {};
            if (currentUser.role !== "admin") {
                window.location.href = "../login.html";
            }
            document.getElementById("userEmail").innerText = currentUser.email || "Admin";
        }

        function loadAuditLogs() {
            // Mock data for demonstration
            const mockLogs = [
                {
                    timestamp: new Date().toLocaleString(),
                    user: "admin@safereport.com",
                    action: "login",
                    target: "System",
                    details: "Admin logged in"
                },
                {
                    timestamp: new Date(Date.now() - 3600000).toLocaleString(),
                    user: "admin@safereport.com",
                    action: "update",
                    target: "Complaint #123",
                    details: "Changed status to RESOLVED"
                },
                {
                    timestamp: new Date(Date.now() - 7200000).toLocaleString(),
                    user: "authority@dept.gov",
                    action: "create",
                    target: "Admin Notes",
                    details: "Added notes to complaint"
                }
            ];

            const tbody = document.getElementById("logsBody");
            tbody.innerHTML = mockLogs.map(log => `
                <tr>
                    <td>${log.timestamp}</td>
                    <td>${log.user}</td>
                    <td><span class="log-action action-${log.action}">${log.action.charAt(0).toUpperCase() + log.action.slice(1)}</span></td>
                    <td>${log.target}</td>
                    <td>${log.details}</td>
                </tr>
            `).join("");
        }

        function logout() {
            localStorage.removeItem("currentUser");
            window.location.href = "../login.html";
        }

        window.addEventListener("DOMContentLoaded", () => {
            checkAdminAccess();
            loadAuditLogs();
        });
    </script>
</body>
</html>
