<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeReport | Assigned Cases</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --accent: #ec4899;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --bg: #f8fafc;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 1000;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .admin-badge {
            background: linear-gradient(135deg, var(--danger), var(--accent));
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 70px;
            width: 280px;
            height: calc(100vh - 70px);
            background: var(--white);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            z-index: 500;
            padding: 20px 0;
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: var(--text-light);
            text-decoration: none;
            transition: all 0.3s;
            border-left: 3px solid transparent;
        }

        .sidebar-menu a:hover,
        .sidebar-menu a.active {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            border-left-color: var(--primary);
            font-weight: 600;
        }

        .sidebar-menu svg {
            width: 20px;
            height: 20px;
        }

        .main-content {
            margin-left: 280px;
            margin-top: 70px;
            padding: 30px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 30px;
        }

        .authority-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .authority-card {
            background: var(--white);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 20px;
            transition: all 0.3s;
        }

        .authority-card:hover {
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.1);
            transform: translateY(-2px);
        }

        .authority-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .authority-name {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
        }

        .workload-badge {
            background: var(--bg);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: var(--primary);
        }

        .case-count {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 15px;
        }

        .count-item {
            text-align: center;
            padding: 10px;
            background: var(--bg);
            border-radius: 6px;
        }

        .count-number {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
        }

        .count-label {
            font-size: 12px;
            color: var(--text-light);
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            margin-top: 15px;
        }

        .btn {
            flex: 1;
            padding: 8px;
            border: 1px solid var(--border);
            background: var(--white);
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            color: var(--primary);
            transition: all 0.3s;
        }

        .btn:hover {
            background: var(--bg);
            border-color: var(--primary);
        }

        .logout-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        @media (max-width: 1200px) {
            .authority-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .authority-grid {
                grid-template-columns: 1fr;
            }

            .main-content {
                margin-left: 250px;
                padding: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="topbar">
        <div style="display: flex; align-items: center;">
            <div class="logo-text">SafeReport</div>
            <span class="admin-badge">ADMIN</span>
        </div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <span id="userEmail" style="font-size: 14px; color: var(--text-light);"></span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="sidebar">
        <ul class="sidebar-menu">
            <li><a href="admin-dashboard.html">Dashboard</a></li>
            <li><a href="all-complaints.html">All Complaints</a></li>
            <li><a href="pending-review.html">Pending Review</a></li>
            <li><a href="assigned-cases.html" class="active">Assigned Cases</a></li>
            <li><a href="user-management.html">User Management</a></li>
            <li><a href="authority-management.html">Authorities</a></li>
            <li><a href="reports.html">Reports</a></li>
            <li><a href="audit-logs.html">Audit Logs</a></li>
            <li><a href="settings.html">Settings</a></li>
        </ul>
    </div>

    <div class="main-content">
        <h1 class="page-title">Assigned Cases</h1>
        <!-- Pending assignment queue -->
        <div id="unassignedSection">
            <h2 style="margin-bottom:16px;font-size:20px;font-weight:700;">Pending Assignments</h2>
            <div id="unassignedList" style="display:flex;flex-direction:column;gap:16px;">
                <!-- populated by JS -->
            </div>
            <hr style="margin:40px 0;" />
        </div>
        <div class="authority-grid" id="casesGrid"></div>
    </div>

    <script>
        const API = "http://localhost:8080/api";
        let allAuthorities = [];

        function getToken() { return localStorage.getItem("token"); }
        function esc(s) { return (s||'').replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

        function checkAdminAccess() {
            const role = localStorage.getItem("role");
            if (!getToken() || role !== "ADMIN") {
                window.location.href = "../login.html";
                return false;
            }
            document.getElementById("userEmail").innerText = localStorage.getItem("fullName") || "Admin";
            return true;
        }

        async function loadUnassignedCases() {
            try {
                // Fetch complaints with UNDER_REVIEW status (ready to be assigned)
                const res = await fetch(API + "/complaints?status=UNDER_REVIEW&page=0&size=100", {
                    headers: { "Authorization": "Bearer " + getToken() }
                });
                const json = await res.json();
                if (!json.success) { console.error(json.message); return; }
                const unassigned = json.data.content || json.data || [];
                const list = document.getElementById("unassignedList");

                if (unassigned.length === 0) {
                    list.innerHTML = '<div style="color:var(--text-light);">No cases waiting for assignment.</div>';
                    return;
                }

                const opts = allAuthorities.map(a =>
                    `<option value="${a.id}">${esc(a.fullName)} (${esc(a.email)})</option>`
                ).join('');

                list.innerHTML = unassigned.map(c => `
                    <div class="authority-card" style="border-left:4px solid var(--warning);">
                        <div><strong>${esc(c.trackingId || '#'+c.id)}</strong> ${esc(c.title || '')}</div>
                        <div style="margin:6px 0;">Status: ${(c.status||'').replace(/_/g,' ')} | Priority: ${c.priority||'—'} | Category: ${c.categoryName||'—'}</div>
                        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
                            <select id="sel-${c.id}" style="padding:6px 10px;border:1px solid var(--border);border-radius:4px;font-family:Inter,sans-serif;font-size:13px;">${opts.length ? opts : '<option value="">No authorities available</option>'}</select>
                            <button class="btn" onclick="assignTo(${c.id})">Assign</button>
                        </div>
                    </div>
                `).join('');
            } catch(e) {
                console.error("Failed to load unassigned cases:", e);
            }
        }

        async function loadAssignedCases() {
            try {
                // Show each authority and their case count
                const grid = document.getElementById("casesGrid");
                if (allAuthorities.length === 0) {
                    grid.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-light);">No authorities found. Create authorities first from Authority Management.</div>';
                    return;
                }

                grid.innerHTML = allAuthorities.map(a => `
                    <div class="authority-card">
                        <div class="authority-header">
                            <div class="authority-name">${esc(a.fullName)}</div>
                            <div class="workload-badge"><span style="color:${a.active ? 'var(--success)' : 'var(--danger)'}">${a.active ? 'Active' : 'Disabled'}</span></div>
                        </div>
                        <div style="font-size:13px;color:var(--text-light);margin:8px 0;">
                            <div>${esc(a.email)}</div>
                            <div>${esc(a.phone ||'—')}</div>
                        </div>
                    </div>
                `).join("");
            } catch(e) {
                console.error("Failed to display assigned cases:", e);
            }
        }

        async function assignTo(complaintId) {
            const sel = document.getElementById(`sel-${complaintId}`);
            if (!sel || !sel.value) {
                alert('Please select an authority');
                return;
            }
            try {
                const res = await fetch(API + "/complaints/" + complaintId + "/assign", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + getToken()
                    },
                    body: JSON.stringify({ authorityId: parseInt(sel.value) })
                });
                const json = await res.json();
                if (json.success) {
                    alert('✅ Complaint assigned successfully!');
                    loadUnassignedCases();
                    loadAssignedCases();
                } else {
                    alert('❌ ' + json.message);
                }
            } catch(e) {
                alert('❌ Error: ' + e.message);
            }
        }

        function logout() {
            ["token","role","userId","fullName","email"].forEach(k => localStorage.removeItem(k));
            window.location.href = "../login.html";
        }

        window.addEventListener("DOMContentLoaded", async () => {
            if (!checkAdminAccess()) return;
            // Load authorities first (needed for dropdown)
            try {
                const res = await fetch(API + "/admin/authorities", {
                    headers: { "Authorization": "Bearer " + getToken() }
                });
                const json = await res.json();
                if (json.success) allAuthorities = json.data || [];
            } catch(e) { console.error(e); }

            loadUnassignedCases();
            loadAssignedCases();
        });
    </script>
</body>

</html>
