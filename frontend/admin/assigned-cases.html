<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeReport | Assigned Cases</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --accent: #ec4899;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --bg: #f8fafc;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 1000;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .admin-badge {
            background: linear-gradient(135deg, var(--danger), var(--accent));
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 70px;
            width: 280px;
            height: calc(100vh - 70px);
            background: var(--white);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            z-index: 500;
            padding: 20px 0;
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: var(--text-light);
            text-decoration: none;
            transition: all 0.3s;
            border-left: 3px solid transparent;
        }

        .sidebar-menu a:hover,
        .sidebar-menu a.active {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            border-left-color: var(--primary);
            font-weight: 600;
        }

        .sidebar-menu svg {
            width: 20px;
            height: 20px;
        }

        .main-content {
            margin-left: 280px;
            margin-top: 70px;
            padding: 30px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 30px;
        }

        .authority-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .authority-card {
            background: var(--white);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 20px;
            transition: all 0.3s;
        }

        .authority-card:hover {
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.1);
            transform: translateY(-2px);
        }

        .authority-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .authority-name {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
        }

        .workload-badge {
            background: var(--bg);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: var(--primary);
        }

        .case-count {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 15px;
        }

        .count-item {
            text-align: center;
            padding: 10px;
            background: var(--bg);
            border-radius: 6px;
        }

        .count-number {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
        }

        .count-label {
            font-size: 12px;
            color: var(--text-light);
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            margin-top: 15px;
        }

        .btn {
            flex: 1;
            padding: 8px;
            border: 1px solid var(--border);
            background: var(--white);
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            color: var(--primary);
            transition: all 0.3s;
        }

        .btn:hover {
            background: var(--bg);
            border-color: var(--primary);
        }

        .logout-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        @media (max-width: 1200px) {
            .authority-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .authority-grid {
                grid-template-columns: 1fr;
            }

            .main-content {
                margin-left: 250px;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div style="display: flex; align-items: center;">
            <div class="logo-text">SafeReport</div>
            <span class="admin-badge">ADMIN</span>
        </div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <span id="userEmail" style="font-size: 14px; color: var(--text-light);"></span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="sidebar">
        <ul class="sidebar-menu">
            <li><a href="admin-dashboard.html">Dashboard</a></li>
            <li><a href="all-complaints.html">All Complaints</a></li>
            <li><a href="pending-review.html">Pending Review</a></li>
            <li><a href="assigned-cases.html" class="active">Assigned Cases</a></li>
            <li><a href="user-management.html">User Management</a></li>
            <li><a href="authority-management.html">Authorities</a></li>
            <li><a href="reports.html">Reports</a></li>
            <li><a href="audit-logs.html">Audit Logs</a></li>
            <li><a href="notifications.html">Notifications</a></li>
            <li><a href="settings.html">Settings</a></li>
        </ul>
    </div>

    <div class="main-content">
        <h1 class="page-title">Assigned Cases</h1>
        <!-- Pending assignment queue -->
        <div id="unassignedSection">
            <h2 style="margin-bottom:16px;font-size:20px;font-weight:700;">Pending Assignments</h2>
            <div id="unassignedList" style="display:flex;flex-direction:column;gap:16px;">
                <!-- populated by JS -->
            </div>
            <hr style="margin:40px 0;"/>
        </div>
        <div class="authority-grid" id="casesGrid"></div>
    </div>

    <script>
        function checkAdminAccess() {
            const currentUser = JSON.parse(localStorage.getItem("currentUser")) || {};
            if (currentUser.role !== "admin") {
                window.location.href = "../login.html";
            }
            document.getElementById("userEmail").innerText = currentUser.email || "Admin";
        }

        function loadAssignedCases() {
            const authorities = JSON.parse(localStorage.getItem("authorities")) || [];
            const complaints = JSON.parse(localStorage.getItem("complaints")) || [];

            const grid = document.getElementById("casesGrid");
            grid.innerHTML = authorities.map(authority => {
                const assigned = complaints.filter(c => c.assignedTo === authority.email && c.status !== "RESOLVED");
                const resolved = complaints.filter(c => c.assignedTo === authority.email && c.status === "RESOLVED");
                const total = assigned.length + resolved.length;
                const workload = total > 10 ? "High" : total > 5 ? "Medium" : "Low";

                return `
                    <div class="authority-card">
                        <div class="authority-header">
                            <div class="authority-name">${authority.name}</div>
                            <div class="workload-badge">${workload} Workload</div>
                        </div>
                        <div class="case-count">
                            <div class="count-item">
                                <div class="count-number">${assigned.length}</div>
                                <div class="count-label">Assigned</div>
                            </div>
                            <div class="count-item">
                                <div class="count-number">${resolved.length}</div>
                                <div class="count-label">Resolved</div>
                            </div>
                        </div>
                        <div class="action-buttons">
                            <button class="btn" onclick="viewCases('${authority.id}')">View Cases</button>
                            <button class="btn" onclick="reassignCases('${authority.id}')">Reassign</button>
                        </div>
                    </div>
                `;
            }).join("");
        }

        function viewCases(authorityId) {
            alert("View cases for authority: " + authorityId);
        }

        function reassignCases(authorityId) {
            alert("Reassign cases feature coming soon");
        }

        function logout() {
            localStorage.removeItem("currentUser");
            window.location.href = "../login.html";
        }

        // simple toast fallback
        function showToast(msg, type='success') {
            alert(msg);
        }

        function loadUnassignedCases() {
            const complaints = JSON.parse(localStorage.getItem("complaints")) || [];
            const authorities = JSON.parse(localStorage.getItem("authorities")) || [];
            const list = document.getElementById("unassignedList");
            const unassigned = complaints.filter(c => c.status === "UNDER REVIEW");
            if (unassigned.length === 0) {
                list.innerHTML = '<div style="color:var(--text-light);">No cases waiting for assignment.</div>';
                return;
            }
            list.innerHTML = unassigned.map(c => {
                const opts = authorities.map(a =>
                    `<option value="${a.id}">${a.name} (${a.department || 'N/A'})</option>`
                ).join('');
                return `
                    <div class="authority-card" style="border-left:4px solid var(--warning);">
                        <div><strong>#${c.id}</strong> ${c.subject || ''}</div>
                        <div style="margin:6px 0;">Status: ${c.status}</div>
                        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
                            <select id="sel-${c.id}">${opts}</select>
                            <button class="btn" onclick="assignTo('${c.id}')">Assign</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function assignTo(complaintId) {
            const sel = document.getElementById(`sel-${complaintId}`);
            if (!sel || !sel.value) {
                alert('Please select an authority');
                return;
            }
            const complaints = JSON.parse(localStorage.getItem("complaints")) || [];
            const authorities = JSON.parse(localStorage.getItem("authorities")) || [];
            const comp = complaints.find(c => c.id === complaintId);
            if (comp) {
                comp.status = "ASSIGNED";
                // store authority email so login-based pages can match
                const auth = (authorities.find(a=>a.id===sel.value)||{});
                comp.assignedTo = auth.email || sel.value;
                comp.timeline = comp.timeline || [];
                comp.timeline.push({
                    status: 'Assigned',
                    date: new Date().toISOString(),
                    description: 'Assigned by admin'
                });
                localStorage.setItem("complaints", JSON.stringify(complaints));
                loadUnassignedCases();
                loadAssignedCases();
                showToast('Complaint #' + complaintId + ' assigned successfully', 'success');
            }
        }

        window.addEventListener("DOMContentLoaded", () => {
            checkAdminAccess();
            loadUnassignedCases();
            loadAssignedCases();
        });
    </script>
</body>
</html>
