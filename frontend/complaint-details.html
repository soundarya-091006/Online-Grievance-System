<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeReport | Complaint Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --accent: #ec4899;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text: #1e293b;
            --text-light: #64748b;
            --text-dark: #0f172a;
            --border: #e2e8f0;
            --bg: #f8fafc;
            --bg-light: #f1f5f9;
            --white: #ffffff;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }
        
        /* Topbar */
        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            gap: 20px;
        }
        
        .topbar-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        
        .back-btn:hover {
            background: var(--bg);
            transform: translateX(-3px);
        }
        
        .back-btn svg {
            width: 18px;
            height: 18px;
        }
        
        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .logo-icon {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
        }
        
        .logo-icon svg {
            width: 24px;
            height: 24px;
        }
        
        .logo-text {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* Main Content */
        .main-content {
            margin-top: 100px;
            padding: 40px 30px;
            max-width: 1100px;
            margin-left: auto;
            margin-right: auto;
        }
        
        /* Complaint Header */
        .complaint-header {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .complaint-header-left {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .complaint-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .complaint-id {
            font-size: 28px;
            font-weight: 800;
            color: var(--primary);
        }
        
        .complaint-subject {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            margin-top: 12px;
        }
        
        .complaint-badges {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
        }
        
        .badge.status {
            background: rgba(59, 130, 246, 0.1);
            color: #1e40af;
        }
        
        .badge.priority {
            background: rgba(239, 68, 68, 0.1);
            color: #7f1d1d;
        }
        
        .badge.category {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
        }
        
        /* Details Section */
        .details-section {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 30px;
        }
        
        .section-title {
            padding: 20px 30px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.05), rgba(139, 92, 246, 0.05));
            border-bottom: 1px solid var(--border);
            font-size: 16px;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-content {
            padding: 30px;
        }
        
        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        
        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .detail-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .detail-value {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
        }
        
        .description-box {
            grid-column: 1 / -1;
            padding: 20px;
            background: var(--bg);
            border-radius: 12px;
            border-left: 4px solid var(--primary);
            line-height: 1.6;
        }
        
        /* Evidence Gallery */
        .evidence-gallery {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }
        
        .evidence-item {
            padding: 15px;
            background: var(--bg-light);
            border: 1px solid var(--border);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        
        .evidence-item:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
            transform: translateY(-4px);
        }
        
        .evidence-icon {
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 10px;
        }
        
        .evidence-name {
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
            word-break: break-word;
        }
        
        .evidence-size {
            font-size: 11px;
            color: var(--text-light);
        }
        
        /* Timeline Section */
        .timeline-section {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }
        
        .timeline-content {
            padding: 30px;
        }
        
        .timeline {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        
        .timeline-item {
            display: flex;
            gap: 20px;
            position: relative;
        }
        
        .timeline-item:not(:last-child)::after {
            content: '';
            position: absolute;
            left: 19px;
            top: 60px;
            width: 2px;
            height: 60px;
            background: var(--border);
        }
        
        .timeline-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            flex-shrink: 0;
            transition: all 0.3s ease;
            background: var(--white);
        }
        
        .timeline-icon.completed {
            background: var(--success);
            border-color: var(--success);
            color: white;
        }
        
        .timeline-icon.current {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-color: transparent;
            color: white;
            animation: pulse 2s infinite;
        }
        
        .timeline-icon.pending {
            background: var(--white);
            border-color: var(--border);
            color: var(--border);
        }
        
        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7);
            }
            50% {
                box-shadow: 0 0 0 12px rgba(99, 102, 241, 0);
            }
        }
        
        .timeline-body {
            flex: 1;
            padding-top: 5px;
        }
        
        .timeline-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
        }
        
        .timeline-description {
            font-size: 14px;
            color: var(--text-light);
            line-height: 1.5;
            margin-bottom: 8px;
        }
        
        .timeline-date {
            font-size: 12px;
            color: var(--text-light);
            margin-top: 8px;
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 2px solid var(--border);
            padding: 0 30px;
            margin-bottom: 0;
        }
        
        .tab-button {
            padding: 15px 20px;
            background: none;
            border: none;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-light);
            cursor: pointer;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
            position: relative;
            bottom: -2px;
        }
        
        .tab-button.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        /* Status History Items */
        .status-history-item {
            padding: 20px;
            background: var(--bg-light);
            border-radius: 12px;
            border-left: 4px solid var(--primary);
            margin-bottom: 15px;
        }
        
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
        }
        
        .history-status {
            font-weight: 700;
            color: var(--primary);
            font-size: 14px;
        }
        
        .history-timestamp {
            font-size: 12px;
            color: var(--text-light);
        }
        
        .history-description {
            font-size: 14px;
            color: var(--text);
            margin-bottom: 8px;
        }
        
        .history-notes {
            font-size: 13px;
            color: var(--text-light);
            font-style: italic;
        }
        
        /* Action Button */
        .action-section {
            display: flex;
            gap: 15px;
            padding: 30px;
            border-top: 1px solid var(--border);
            justify-content: flex-start;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 24px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }
        
        .btn-primary:hover {
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: var(--white);
            border: 1px solid var(--border);
            color: var(--text);
        }
        
        .btn-secondary:hover {
            background: var(--bg);
            border-color: var(--primary);
        }
        
        /* Empty State */
        .empty-state {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 60px 30px;
            text-align: center;
            margin-top: 40px;
        }
        
        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        .empty-state-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 10px;
        }
        
        .empty-state-text {
            font-size: 15px;
            color: var(--text-light);
            margin-bottom: 20px;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: var(--white);
            padding: 30px;
            border-radius: 16px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }
        
        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--text-light);
        }
        
        .modal-close:hover {
            color: var(--text);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .topbar {
                padding: 0 15px;
                height: 60px;
            }
            
            .main-content {
                margin-top: 80px;
                padding: 20px 15px;
            }
            
            .complaint-header {
                padding: 20px;
                flex-direction: column;
            }
            
            .details-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .description-box {
                grid-column: 1;
            }
            
            .section-content {
                padding: 20px;
            }
            
            .timeline-content {
                padding: 20px;
            }
            
            .evidence-gallery {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }
            
            .tabs {
                padding: 0 20px;
            }
        }
        
        @media (max-width: 480px) {
            .topbar {
                gap: 10px;
            }
            
            .complaint-id {
                font-size: 22px;
            }
            
            .complaint-subject {
                font-size: 16px;
            }
            
            .tabs {
                padding: 0 15px;
                gap: 5px;
            }
            
            .tab-button {
                padding: 12px 15px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Topbar -->
    <div class="topbar">
        <div class="topbar-left">
            <a href="my-complaint.html" class="back-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="19" y1="12" x2="5" y2="12"/>
                    <polyline points="12 19 5 12 12 5"/>
                </svg>
                Back
            </a>
            
            <div class="logo-section">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none">
                        <defs>
                            <linearGradient id="shieldGrad" x1="0" y1="0" x2="1" y2="1">
                                <stop offset="0%" stop-color="#6366f1"/>
                                <stop offset="100%" stop-color="#8b5cf6"/>
                            </linearGradient>
                        </defs>
                        <path d="M12 2L4 5V11C4 16 7.5 20 12 22C16.5 20 20 16 20 11V5L12 2Z"
                            fill="url(#shieldGrad)"/>
                        <path d="M9.5 12.5L11 14L14.5 10.5"
                            stroke="white"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"/>
                    </svg>
                </div>
                <span class="logo-text">SafeReport</span>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div id="complaintContent">
            <!-- Complaint details will be loaded here -->
        </div>
    </div>

    <!-- File Preview Modal -->
    <div class="modal" id="fileModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeFileModal()">✕</button>
            <div id="fileModalContent"></div>
        </div>
    </div>

    <script>
        // Get complaint ID from URL
        function getComplaintIdFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        // Format bytes to readable size
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        // Get file icon based on type
        function getFileIcon(type) {
            if (type.startsWith('image/')) return '🖼️';
            if (type.startsWith('video/')) return '🎬';
            if (type.startsWith('audio/')) return '🎵';
            if (type.includes('pdf')) return '📄';
            return '📎';
        }

        // Download file
        function downloadFile(fileName, fileData) {
            const link = document.createElement('a');
            link.href = fileData;
            link.download = fileName;
            link.click();
        }

        // Preview file
        function previewFile(fileName, fileData, fileType) {
            const modal = document.getElementById('fileModal');
            const content = document.getElementById('fileModalContent');
            
            if (fileType.startsWith('image/')) {
                content.innerHTML = `
                    <img src="${fileData}" style="max-width: 100%; border-radius: 8px;">
                    <p style="text-align: center; margin-top: 15px; color: var(--text-light);">${fileName}</p>
                    <button class="btn btn-primary" style="margin-top: 15px; width: 100%;" onclick="downloadFile('${fileName}', '${fileData}')">
                        📥 Download
                    </button>
                `;
            } else {
                content.innerHTML = `
                    <div style="padding: 40px; text-align: center; background: var(--bg-light); border-radius: 12px;">
                        <div style="font-size: 64px; margin-bottom: 20px;">${getFileIcon(fileType)}</div>
                        <p style="font-size: 16px; font-weight: 600; margin-bottom: 10px;">${fileName}</p>
                        <p style="color: var(--text-light); margin-bottom: 20px;">Click download to retrieve the file</p>
                        <button class="btn btn-primary" style="width: 100%;" onclick="downloadFile('${fileName}', '${fileData}')">
                            📥 Download
                        </button>
                    </div>
                `;
            }
            
            modal.classList.add('active');
        }

        function closeFileModal() {
            const modal = document.getElementById('fileModal');
            modal.classList.remove('active');
        }

        // Download full report
        function downloadReport() {
            const complaintId = getComplaintIdFromURL();
            const complaints = JSON.parse(localStorage.getItem("complaints")) || [];
            const complaint = complaints.find(c => c.id == complaintId);

            if (!complaint) return;

            let reportContent = `SAFEREPORT GRIEVANCE SYSTEM
Complaint Report

================================================================================
COMPLAINT INFORMATION
================================================================================

Complaint ID: #${complaint.id}
Subject: ${complaint.subject}
Status: ${complaint.status}
Priority: ${complaint.priority}
Category: ${complaint.category}

Submitted Date: ${complaint.date}
Submitted Time: ${complaint.time || 'Not specified'}
Submitted On: ${new Date(complaint.createdAt).toLocaleString()}

================================================================================
INCIDENT DETAILS
================================================================================

Location: ${complaint.location}
Description:
${complaint.description}

================================================================================
STATUS HISTORY
================================================================================
`;

            if (complaint.statusHistory && complaint.statusHistory.length > 0) {
                complaint.statusHistory.forEach((status, index) => {
                    reportContent += `
Status ${index + 1}: ${status.status}
Date & Time: ${new Date(status.timestamp).toLocaleString()}
Description: ${status.description}
${status.notes ? `Notes: ${status.notes}` : ''}
${status.assignedTo ? `Assigned To: ${status.assignedTo}` : ''}
---
`;
                });
            }

            reportContent += `
================================================================================
TARGET RESOLUTION DATE
================================================================================
${complaint.targetResolutionDate ? new Date(complaint.targetResolutionDate).toLocaleDateString() : 'To be determined'}

================================================================================
EVIDENCE & ATTACHMENTS
================================================================================
Total Files: ${complaint.files ? complaint.files.length : 0}
`;

            if (complaint.files && complaint.files.length > 0) {
                complaint.files.forEach((file, index) => {
                    reportContent += `
File ${index + 1}: ${file.name}
Size: ${formatFileSize(file.size)}
Type: ${file.type}
---
`;
                });
            }

            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(reportContent));
            element.setAttribute('download', `Complaint_${complaint.id}.txt`);
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
        }

        // Switch tabs
        function switchTab(tabName) {
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');
        }

        // Load complaint details
        function loadComplaintDetails() {
            const complaintId = getComplaintIdFromURL();
            const complaints = JSON.parse(localStorage.getItem("complaints")) || [];
            const complaint = complaints.find(c => c.id == complaintId);

            const contentContainer = document.getElementById("complaintContent");

            if (!complaint) {
                contentContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">❌</div>
                        <div class="empty-state-title">Complaint Not Found</div>
                        <div class="empty-state-text">The complaint you're looking for doesn't exist or has been deleted.</div>
                        <a href="my-complaint.html" class="btn btn-primary">Go Back to Complaints</a>
                    </div>
                `;
                return;
            }

            // Build Evidence Gallery
            let evidenceHTML = '';
            if (complaint.files && complaint.files.length > 0) {
                evidenceHTML = complaint.files.map((file, idx) => `
                    <div class="evidence-item" onclick="previewFile('${file.name.replace(/'/g, "\\'")}', '${file.data}', '${file.type}')">
                        <div class="evidence-icon">${getFileIcon(file.type)}</div>
                        <div class="evidence-name">${file.name}</div>
                        <div class="evidence-size">${formatFileSize(file.size)}</div>
                    </div>
                `).join('');
            }

            // Build Status History
            let statusHistoryHTML = '<div style="padding: 20px; text-align: center; color: var(--text-light);">No status updates yet</div>';
            if (complaint.statusHistory && complaint.statusHistory.length > 0) {
                statusHistoryHTML = complaint.statusHistory.map(status => `
                    <div class="status-history-item">
                        <div class="history-header">
                            <div class="history-status">📍 ${status.status}</div>
                            <div class="history-timestamp">${new Date(status.timestamp).toLocaleString()}</div>
                        </div>
                        <div class="history-description">${status.description}</div>
                        ${status.assignedTo ? `<div class="history-notes">🏢 Assigned to: ${status.assignedTo}</div>` : ''}
                        ${status.notes ? `<div class="history-notes">📝 ${status.notes}</div>` : ''}
                    </div>
                `).join('');
            }

            // Determine timeline status
            let submittedDate = complaint.date;

            let timelineHTML = `
                <div class="timeline-item">
                    <div class="timeline-icon completed">✓</div>
                    <div class="timeline-body">
                        <div class="timeline-title">Complaint Submitted</div>
                        <div class="timeline-description">Your complaint has been successfully received and registered in the system.</div>
                        <div class="timeline-date">${submittedDate} at ${complaint.time || 'N/A'}</div>
                    </div>
                </div>

                <div class="timeline-item">
                    <div class="timeline-icon ${complaint.status === 'NEW' ? 'current' : 'completed'}">✓</div>
                    <div class="timeline-body">
                        <div class="timeline-title">Assigned to Authority</div>
                        <div class="timeline-description">Your complaint has been assigned to the relevant authority for investigation.</div>
                        <div class="timeline-date">Under Review</div>
                    </div>
                </div>

                <div class="timeline-item">
                    <div class="timeline-icon ${complaint.status === 'RESOLVED' ? 'completed' : 'pending'}">${complaint.status === 'RESOLVED' ? '✓' : ''}</div>
                    <div class="timeline-body">
                        <div class="timeline-title">Investigation in Progress</div>
                        <div class="timeline-description">The authority is actively investigating and reviewing your complaint to take appropriate action.</div>
                        <div class="timeline-date">In Progress</div>
                    </div>
                </div>

                <div class="timeline-item">
                    <div class="timeline-icon ${complaint.status === 'RESOLVED' ? 'completed' : 'pending'}">${complaint.status === 'RESOLVED' ? '✓' : ''}</div>
                    <div class="timeline-body">
                        <div class="timeline-title">Resolution</div>
                        <div class="timeline-description">${complaint.status === 'RESOLVED' ? 'Your complaint has been resolved.' : 'Awaiting resolution and feedback from the relevant authority.'}</div>
                        <div class="timeline-date">${complaint.status === 'RESOLVED' ? 'Completed' : 'Pending'}</div>
                        ${complaint.targetResolutionDate ? `<div class="timeline-date" style="margin-top: 10px; color: var(--warning);">📅 Target Date: ${new Date(complaint.targetResolutionDate).toLocaleDateString()}</div>` : ''}
                    </div>
                </div>
            `;

            const html = `
                <!-- Complaint Header -->
                <div class="complaint-header">
                    <div class="complaint-header-left">
                        <div class="complaint-label">Complaint ID</div>
                        <div class="complaint-id">#${complaint.id}</div>
                        <div class="complaint-subject">${complaint.subject}</div>
                    </div>
                    <div class="complaint-badges">
                        <div class="badge status">🔵 ${complaint.status}</div>
                        <div class="badge priority">⚡ Priority: ${complaint.priority.toUpperCase()}</div>
                        <div class="badge category">📁 ${complaint.category}</div>
                    </div>
                </div>

                <!-- Details Section -->
                <div class="details-section">
                    <div class="section-title">📋 Complaint Details</div>
                    <div class="section-content">
                        <div class="details-grid">
                            <div class="detail-item">
                                <div class="detail-label">Category</div>
                                <div class="detail-value">${complaint.category}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Priority Level</div>
                                <div class="detail-value">${complaint.priority}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Submitted Date</div>
                                <div class="detail-value">${complaint.date}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Time</div>
                                <div class="detail-value">${complaint.time || 'Not specified'}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Location</div>
                                <div class="detail-value">${complaint.location}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Current Status</div>
                                <div class="detail-value">${complaint.status}</div>
                            </div>
                            <div class="description-box">
                                <strong style="color: var(--text); display: block; margin-bottom: 10px;">📝 Description of Complaint</strong>
                                ${complaint.description}
                            </div>
                            ${evidenceHTML ? `
                            <div style="grid-column: 1 / -1;">
                                <strong style="color: var(--text); display: block; margin-bottom: 15px;">📎 Evidence & Attachments (${complaint.files ? complaint.files.length : 0})</strong>
                                <div class="evidence-gallery">
                                    ${evidenceHTML}
                                </div>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                </div>

                <!-- Tabs Section -->
                <div class="details-section">
                    <div class="tabs">
                        <button class="tab-button active" onclick="switchTab('timelineTab')">📍 Investigation Timeline</button>
                        <button class="tab-button" onclick="switchTab('historyTab')">📊 Status History</button>
                    </div>

                    <!-- Timeline Tab -->
                    <div id="timelineTab" class="tab-content active">
                        <div class="timeline-content">
                            <div class="timeline">
                                ${timelineHTML}
                            </div>
                        </div>
                    </div>

                    <!-- Status History Tab -->
                    <div id="historyTab" class="tab-content">
                        <div class="timeline-content">
                            ${statusHistoryHTML}
                        </div>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="details-section">
                    <div class="action-section">
                        <button class="btn btn-primary" onclick="downloadReport()">
                            📥 Download Report
                        </button>
                        <a href="my-complaint.html" class="btn btn-secondary">
                            ← Back to Complaints
                        </a>
                    </div>
                </div>
            `;

            contentContainer.innerHTML = html;
        }

        // Load details on page load
        window.addEventListener("load", loadComplaintDetails);

        // Real-time tracking - listen for updates
        window.addEventListener('storage', () => {
            loadComplaintDetails();
        });

        window.addEventListener('complaintsUpdated', () => {
            loadComplaintDetails();
        });
    </script>
</body>
</html>
