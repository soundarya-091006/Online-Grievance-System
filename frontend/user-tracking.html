<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Complaint Tracking | SafeReport</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
display:flex;
background:#f4f6fb;
}

/* SIDEBAR */
.sidebar{
width:240px;
background:#111827;
color:white;
height:100vh;
padding:30px 20px;
}

.sidebar h2{
margin-bottom:40px;
font-weight:600;
}

.sidebar a{
display:block;
color:#cbd5e1;
text-decoration:none;
margin-bottom:20px;
transition:0.3s;
}

.sidebar a:hover{
color:white;
transform:translateX(6px);
}

/* MAIN */
.main{
flex:1;
padding:40px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.header h1{
font-size:24px;
font-weight:600;
}

/* SEARCH */
.search-box{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 15px 35px rgba(0,0,0,0.05);
display:flex;
gap:15px;
margin-bottom:30px;
}

.search-box input{
flex:1;
padding:14px;
border-radius:12px;
border:1px solid #ddd;
outline:none;
}

.search-box button{
background:linear-gradient(90deg,#2563eb,#7c3aed);
color:white;
border:none;
padding:14px 25px;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

.search-box button:hover{
transform:translateY(-2px);
}

/* CARD */
.card{
background:white;
padding:35px;
border-radius:24px;
box-shadow:0 20px 40px rgba(0,0,0,0.06);
animation:fadeUp 0.6s ease;
}

.status-badge{
display:inline-block;
padding:6px 15px;
border-radius:30px;
font-size:12px;
background:linear-gradient(90deg,#2563eb,#7c3aed);
color:white;
margin-top:10px;
}

/* SLA */
.sla-box{
margin-top:25px;
padding:20px;
background:#fff7ed;
border-radius:16px;
}

.sla-timer{
font-size:18px;
font-weight:600;
margin:10px 0;
}

.sla-progress-container{
width:100%;
height:10px;
background:#fde68a;
border-radius:20px;
overflow:hidden;
}

.sla-progress-bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#f59e0b,#ef4444);
transition:width 1s linear;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:30px;
}

.info-box{
background:#f9fafb;
padding:20px;
border-radius:18px;
}

/* TIMELINE */
.timeline{
margin-top:30px;
border-left:3px solid #2563eb;
padding-left:20px;
}

.timeline-step{
margin-bottom:25px;
position:relative;
padding-left:15px;
}

.timeline-step::before{
content:"";
width:14px;
height:14px;
background:#2563eb;
border-radius:50%;
position:absolute;
left:-9px;
top:5px;
}

/* REMARKS */
.remarks-box{
margin-top:30px;
padding:20px;
background:#f9fafb;
border-radius:18px;
}

.remark{
padding:15px;
background:white;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.remark small{
color:gray;
display:block;
margin-top:5px;
}

/* BUTTONS */
.actions{
margin-top:30px;
display:flex;
gap:15px;
}

.btn{
padding:12px 22px;
border-radius:12px;
border:none;
cursor:pointer;
font-weight:500;
}

.btn-primary{
background:linear-gradient(90deg,#2563eb,#7c3aed);
color:white;
}

.btn-outline{
background:white;
border:2px solid #2563eb;
color:#2563eb;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:30px;
border-radius:20px;
width:400px;
}

.modal-content textarea{
width:100%;
height:100px;
margin:15px 0;
padding:10px;
border-radius:10px;
border:1px solid #ddd;
}

/* ANIMATION */
@keyframes fadeUp{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="sidebar">
<h2>SafeReport</h2>
<a href="user-dashboard.html">Dashboard</a>
<a href="#">Track Complaint</a>
<a href="#">Profile</a>
<a href="#">Logout</a>
</div>

<div class="main">

<div class="header">
<h1>Complaint Tracking</h1>
</div>

<div class="search-box">
<input type="text" id="complaintId" placeholder="Enter Complaint ID">
<button onclick="loadComplaint()">Track</button>
</div>

<div id="result"></div>

</div>

<!-- ESCALATION MODAL -->
<div id="escalationModal" class="modal">
<div class="modal-content">
<h3>Escalate Complaint</h3>
<textarea id="escalationReason" placeholder="Provide reason for escalation..."></textarea>
<button class="btn btn-primary" onclick="submitEscalation()">Submit</button>
</div>
</div>

<script>

let complaintData;

function loadComplaint(){

complaintData={
id:"CMP1023",
title:"Workplace Harassment Case",
description:"Reported inappropriate behaviour at office.",
status:"Under Review",
submitted:"2026-02-20",
priority:"High",
authority:"Inspector Priya Sharma",
department:"Women Safety Cell",
remarks:[
{text:"Investigation initiated.",date:"22 Feb 2026"},
{text:"Evidence under review.",date:"23 Feb 2026"}
],
timeline:[
{step:"Complaint Submitted",date:"20 Feb 2026"},
{step:"Assigned to Authority",date:"21 Feb 2026"},
{step:"Under Investigation",date:"22 Feb 2026"}
]
};

renderComplaint(complaintData);
}

function renderComplaint(data){

let html=`
<div class="card">

<h2>${data.title}</h2>
<p>${data.description}</p>
<span class="status-badge">${data.status}</span>

<div class="sla-box">
<h4>Resolution Deadline (SLA)</h4>
<div class="sla-timer" id="slaTimer">Loading...</div>
<div class="sla-progress-container">
<div class="sla-progress-bar" id="slaProgress"></div>
</div>
</div>

<div class="grid">

<div class="info-box">
<h4>Complaint Details</h4>
<p><b>ID:</b> ${data.id}</p>
<p><b>Submitted:</b> ${data.submitted}</p>
<p><b>Priority:</b> ${data.priority}</p>
</div>

<div class="info-box">
<h4>Assigned Authority</h4>
<p><b>Name:</b> ${data.authority}</p>
<p><b>Department:</b> ${data.department}</p>
</div>

</div>

<div class="timeline">
${data.timeline.map(t=>`
<div class="timeline-step">
<h4>${t.step}</h4>
<small>${t.date}</small>
</div>
`).join("")}
</div>

<div class="remarks-box">
<h4>Authority Remarks</h4>
<div id="remarksContainer">
${data.remarks.map(r=>`
<div class="remark">
<p>${r.text}</p>
<small>${r.date}</small>
</div>
`).join("")}
</div>
</div>

<div class="actions">
<button class="btn btn-primary" onclick="downloadPDF()">Download PDF</button>
<button class="btn btn-outline" onclick="openEscalation()">Escalate</button>
</div>

</div>
`;

document.getElementById("result").innerHTML=html;

startSLATimer(new Date(data.submitted));
}

function startSLATimer(submittedDate){

const slaDays=7;
const deadline=new Date(submittedDate);
deadline.setDate(deadline.getDate()+slaDays);

const totalTime=slaDays*24*60*60*1000;
const progressEl=document.getElementById("slaProgress");
const timerEl=document.getElementById("slaTimer");

setInterval(()=>{
const now=new Date();
const remaining=deadline-now;
const elapsed=now-submittedDate;

if(remaining<=0){
timerEl.innerHTML="SLA Breached ⚠ Immediate Action Required";
progressEl.style.width="100%";
progressEl.style.background="#ef4444";
return;
}

const days=Math.floor(remaining/(1000*60*60*24));
const hours=Math.floor((remaining%(1000*60*60*24))/(1000*60*60));
const minutes=Math.floor((remaining%(1000*60*60))/(1000*60));

timerEl.innerHTML=`${days}d ${hours}h ${minutes}m remaining`;

progressEl.style.width=(elapsed/totalTime*100)+"%";

},1000);
}

function openEscalation(){
document.getElementById("escalationModal").style.display="flex";
}

function submitEscalation(){
alert("Complaint escalated to higher authority.");
document.getElementById("escalationModal").style.display="none";
}

async function downloadPDF(){
const { jsPDF } = window.jspdf;
const doc = new jsPDF();
doc.text("SafeReport Complaint Summary",20,20);
doc.text("Complaint ID: "+complaintData.id,20,40);
doc.text("Status: "+complaintData.status,20,50);
doc.save("complaint.pdf");
}

</script>

</body>
</html>
