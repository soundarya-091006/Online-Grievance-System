<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeReport | Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
--primary:#6366f1;
--secondary:#8b5cf6;
--success:#10b981;
--danger:#ef4444;
--warning:#f59e0b;
--text:#1e293b;
--border:#e2e8f0;
--bg:#f8fafc;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
height:100vh;
background:var(--bg);
display:flex;
justify-content:center;
align-items:center;
}

.login-container{
width:520px;
background:white;
padding:45px;
border-radius:24px;
box-shadow:0 25px 70px rgba(0,0,0,0.08);
}

.logo-box{
width:75px;height:75px;
margin:0 auto 15px;
border-radius:18px;
background:linear-gradient(135deg,var(--primary),var(--secondary));
display:flex;align-items:center;justify-content:center;
}

.logo-box svg{width:38px;height:38px;stroke:white;}

h1{text-align:center;color:var(--text);}
.subtitle{text-align:center;color:#64748b;margin-bottom:25px;}

.role-options{
display:flex;
gap:12px;
margin-bottom:25px;
}

.role-card{
flex:1;
padding:18px;
border:2px solid var(--border);
border-radius:16px;
text-align:center;
cursor:pointer;
transition:.3s;
}

.role-card{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:8px;
padding:20px 10px;
}

.role-label{
font-size:14px;
font-weight:500;
color:var(--text);
letter-spacing:.3px;
}

.role-card.active .role-label{
color:var(--primary);
font-weight:600;
}

.role-card.active{
border-color:var(--primary);
background:rgba(99,102,241,0.08);
}

.role-card svg{
width:28px;height:28px;
margin-bottom:6px;
stroke:var(--primary);
}

.form-group{margin-bottom:18px;}

label{display:block;font-size:14px;margin-bottom:6px;color:var(--text);}

input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid var(--border);
outline:none;
transition:.3s;
}

input:focus{
border-color:var(--primary);
box-shadow:0 0 0 3px rgba(99,102,241,0.15);
}

.password-wrapper{position:relative;}
.password-wrapper input{padding-right:40px;}

#togglePassword{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
width:18px;height:18px;
cursor:pointer;
}

/* Hidden by default */
.password-feedback{
display:none;
}

.password-feedback.active{
display:block;
margin-top:8px;
}

.password-rules{
list-style:none;
font-size:12px;
color:#64748b;
margin-top:5px;
}

.password-rules li{
margin-bottom:4px;
}

.password-rules li.valid{
color:var(--success);
font-weight:500;
}

.error-message{
font-size:13px;
color:var(--danger);
margin-top:8px;
display:none;
font-weight:500;
}

.caps-warning{
font-size:12px;
color:var(--danger);
margin-top:5px;
display:none;
}

.login-btn{
width:100%;
padding:13px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,var(--primary),var(--secondary));
color:white;
font-weight:600;
cursor:pointer;
margin-top:10px;
font-size:15px;
}

.register-text{
margin-top:18px;
text-align:center;
font-size:14px;
color:#64748b;
}

.register-text a{
color:var(--primary);
text-decoration:none;
font-weight:500;
}

/* Toast */
.toast{
position:fixed;
top:20px;
right:20px;
background:var(--primary);
color:white;
padding:12px 18px;
border-radius:10px;
opacity:0;
transition:.4s;
font-size:14px;
font-weight:500;
}

.toast.show{opacity:1;}
</style>
</head>

<body>

<div class="login-container">

  <div class="logo-box">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
      <path d="M12 2L4 7v5c0 5 3.5 8 8 10 4.5-2 8-5 8-10V7l-8-5z"/>
    </svg>
  </div>

  <h1>Welcome</h1>
  <div class="subtitle">Login to your SafeReport account</div>

  <div class="role-options">

    <div class="role-card active" onclick="selectRole(this,'user')">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
        <circle cx="12" cy="7" r="4"/>
        <path d="M5.5 21a6.5 6.5 0 0 1 13 0"/>
      </svg>
      <span class="role-label">User</span>
    </div>

    <div class="role-card" onclick="selectRole(this,'admin')">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
        <path d="M12 2L4 7v5c0 5 3.5 8 8 10 4.5-2 8-5 8-10V7l-8-5z"/>
      </svg>
      <span class="role-label">Admin</span>
    </div>

    <div class="role-card" onclick="selectRole(this,'authority')">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
        <path d="M12 2L4 7v5c0 5 3.5 8 8 10 4.5-2 8-5 8-10V7l-8-5z"/>
        <path d="M9 12l2 2 4-4"/>
      </svg>
      <span class="role-label">Authority</span>
    </div>

  </div>

  <form id="loginForm">

    <div class="form-group">
      <label>Email</label>
      <input type="text" id="email" placeholder="Enter your email">
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="password-wrapper">
        <input type="password" id="password" placeholder="Enter your password"
          onfocus="showChecklist()"
          onkeyup="checkRules(event)">
        <svg id="togglePassword" onclick="togglePassword()" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </div>

      <div class="password-feedback" id="passwordFeedback">
        <ul class="password-rules">
          <li id="ruleLength">Minimum 6 characters</li>
          <li id="ruleUpper">At least 1 uppercase letter</li>
          <li id="ruleNumber">At least 1 number</li>
          <li id="ruleSpecial">At least 1 special character</li>
        </ul>
        <div class="caps-warning" id="capsWarning">Caps Lock is ON</div>
      </div>
      <div class="error-message" id="passwordError">
        Password must meet all strength requirements.
      </div>
    </div>

    <!-- Remember & Forgot Row -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;font-size:14px;">
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;color:#64748b;">
        <input type="checkbox" id="rememberMe" style="width:14px;height:14px;">
        Remember Me
      </label>
      <a href="forgot-password.html" style="color:var(--primary);text-decoration:none;font-weight:500;">
        Forgot Password?
      </a>
    </div>

    <button class="login-btn" id="loginBtn" type="submit">
      <span id="btnText">LOGIN</span>
    </button>

  </form>

  <div class="register-text">
    Don't have an account? <a href="register.html">Register here</a>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>

let selectedRole = "user";
let loginAttempts = 0;
const MAX_ATTEMPTS = 3;

/* ================= ROLE SELECTION ================= */
function selectRole(el, role) {
  document.querySelectorAll(".role-card").forEach(card => card.classList.remove("active"));
  el.classList.add("active");
  selectedRole = role;
}

/* ================= PASSWORD TOGGLE ================= */
function togglePassword() {
  const input = document.getElementById("password");
  input.type = input.type === "password" ? "text" : "password";
}

/* ================= SHOW CHECKLIST ON FOCUS ================= */
function showChecklist() {
  document.getElementById("passwordFeedback").classList.add("active");
}

/* ================= LIVE PASSWORD VALIDATION ================= */
function checkRules(e) {
  const pwd = document.getElementById("password").value;

  const hasLength  = pwd.length >= 6;
  const hasUpper   = /[A-Z]/.test(pwd);
  const hasNumber  = /[0-9]/.test(pwd);
  const hasSpecial = /[^A-Za-z0-9]/.test(pwd);

  toggleRule("ruleLength",  hasLength);
  toggleRule("ruleUpper",   hasUpper);
  toggleRule("ruleNumber",  hasNumber);
  toggleRule("ruleSpecial", hasSpecial);

  /* Caps Lock Detection */
  if (e.getModifierState && e.getModifierState("CapsLock")) {
    document.getElementById("capsWarning").style.display = "block";
  } else {
    document.getElementById("capsWarning").style.display = "none";
  }

  /* Hide error once password becomes strong */
  if (hasLength && hasUpper && hasNumber && hasSpecial) {
    document.getElementById("passwordError").style.display = "none";
  }
}

function toggleRule(id, valid) {
  document.getElementById(id).classList.toggle("valid", valid);
}

/* ================= TOAST FUNCTION ================= */
function showToast(message) {
  const toast = document.getElementById("toast");
  toast.innerText = message;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 3000);
}

/* ================= LOGIN SUBMIT ================= */
document.getElementById("loginForm").addEventListener("submit", function(e) {
  e.preventDefault();

  if (loginAttempts >= MAX_ATTEMPTS) {
    showToast("Account locked. Too many failed attempts.");
    return;
  }

  const email = document.getElementById("email").value.trim();
  const pwd   = document.getElementById("password").value;

  /* Remember Me */
  const remember = document.getElementById("rememberMe").checked;
  if (remember) {
    localStorage.setItem("rememberEmail", email);
  } else {
    localStorage.removeItem("rememberEmail");
  }

  const hasLength  = pwd.length >= 6;
  const hasUpper   = /[A-Z]/.test(pwd);
  const hasNumber  = /[0-9]/.test(pwd);
  const hasSpecial = /[^A-Za-z0-9]/.test(pwd);
  const isStrong   = hasLength && hasUpper && hasNumber && hasSpecial;

  /* Email validation */
  if (!email.includes("@")) {
    showToast("Please enter a valid email address");
    return;
  }

  /* Strong password enforcement */
  if (!isStrong) {
    document.getElementById("passwordError").style.display = "block";
    showToast("Password does not meet security requirements");
    loginAttempts++;
    return;
  }

  /* Show loading state */
  const btn     = document.getElementById("loginBtn");
  const btnText = document.getElementById("btnText");
  btnText.innerText = "Authenticating...";
  btn.disabled  = true;

  setTimeout(() => {

    btnText.innerText = "LOGIN";
    btn.disabled = false;

    /* ---- Hardcoded Admin credentials ---- */
    let validUser = null;

    if (email === "admin@test.com" && pwd === "Admin@123" && selectedRole === "admin") {
      validUser = { email: "admin@test.com", role: "admin" };
    } else {
      /* Check registered users from localStorage */
      const users = JSON.parse(localStorage.getItem("users")) || [];
      validUser = users.find(user =>
        user.email === email &&
        user.password === pwd &&
        user.role === selectedRole
      );
    }

    if (validUser) {
      validUser.role = validUser.role.toLowerCase();
      localStorage.setItem("currentUser", JSON.stringify(validUser));
      showToast("Login Successful!");
      setTimeout(() => redirectToDashboard(validUser.role), 800);
    } else {
      showToast("Invalid Credentials");
      loginAttempts++;
    }

  }, 1500);
});

/* ================= ROLE BASED REDIRECT ================= */
function redirectToDashboard(role) {
  switch (role.toLowerCase()) {
    case "user":      window.location.href = "user-dashboard.html";      break;
    case "admin":     window.location.href = "admin-dashboard.html";     break;
    case "authority": window.location.href = "authority-dashboard.html"; break;
    default:          window.location.href = "index.html";
  }
}

/* ================= REMEMBER ME ON LOAD ================= */
window.addEventListener("load", function () {
  const savedEmail = localStorage.getItem("rememberEmail");
  if (savedEmail) {
    document.getElementById("email").value = savedEmail;
    document.getElementById("rememberMe").checked = true;
  }
});

</script>

</body>
</html>
