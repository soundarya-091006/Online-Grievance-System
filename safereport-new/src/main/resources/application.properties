# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/api

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/safereport_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_mysql_password_here

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false
spring.sql.init.mode=always

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=SafeReportSuperSecretKeyForJWTTokenMustBe256BitsLongXXXXXXXXXXXX
app.jwt.expiration-ms=604800000
app.jwt.refresh-expiration-ms=604800000

# ── File Upload ───────────────────────────────────────────────────────────────
app.upload.dir=uploads/
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ── CORS ──────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500,http://localhost:8081,http://localhost:5173

# ── Email / SMTP ──────────────────────────────────────────────────────────────
# Option 1: Gmail (use App Password — NOT your real password)
# Go to: Google Account → Security → 2-Step Verification → App passwords
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=soundselvam1@gmail.com
spring.mail.password=soundarya0911!
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Option 2: Disable email entirely (no errors, just skips sending)
# app.email.enabled=false

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.safereport=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN